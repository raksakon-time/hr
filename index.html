                                    <p className="text-sm text-gray-500 mt-1">คลิกที่ช่องวันที่ในตารางเพื่อ <strong>จัดเวร</strong> หรือระบุวันหยุดของพนักงาน</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={exportScheduleToCSV} className="bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-4 py-2.5 rounded-xl text-sm font-medium transition-colors shadow-sm flex items-center"><i className="fa-solid fa-file-excel mr-2 text-green-600"></i>ส่งออกตารางเวร (Excel)</button>
                                </div>
                            </div>
                            {filterDept ? (
                                <div className="overflow-x-auto border border-gray-200 rounded-xl bg-white shadow-sm">
                                    <table className="min-w-full text-sm text-left whitespace-nowrap select-none">
                                        <thead className="bg-blue-50 border-b border-blue-100">
                                            <tr>
                                                <th rowSpan="2" className="px-4 py-3 font-semibold text-blue-900 sticky left-0 bg-blue-50 z-10 border-r border-blue-100 align-middle">พนักงาน</th>
                                                {daysArray.map(day => <th key={day} rowSpan="2" className="px-1 py-3 font-semibold text-blue-900 text-center min-w-[40px] align-middle">{day}</th>)}
                                                
                                                <th colSpan={sortedShiftTypesUsed.length} className="px-2 py-1 font-bold text-indigo-800 text-center bg-indigo-50/70 border-l border-b border-indigo-200 border-r border-gray-200">จำนวนเวรแยกประเภท</th>
                                                
                                                <th rowSpan="2" className="px-3 py-3 font-bold text-gray-700 text-center bg-gray-100 border-l border-gray-200 align-middle">รวมเวร</th>
                                                <th rowSpan="2" className="px-3 py-3 font-bold text-blue-700 text-center bg-blue-50 border-l border-blue-100 align-middle shadow-inner">เหลือ OT</th>
                                            </tr>
                                            <tr>
                                                {sortedShiftTypesUsed.map(type => (
                                                    <th key={type} className="px-1 py-1 font-semibold text-indigo-700 text-center bg-indigo-50/70 border-x border-white text-[11px]">{type}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {summaryMatrix.map(row => {
                                                const empId = row.empId;
                                                const emp = employees[empId];
                                                return (
                                                    <tr key={empId} className="hover:bg-blue-50/50 transition-colors group">
                                                        <td className="px-4 py-2 sticky left-0 bg-white group-hover:bg-blue-50/50 z-10 border-r border-gray-200">
                                                            <p className="font-medium text-gray-900">{emp.fname} {emp.lname}</p>
                                                            <p className="text-[10px] text-gray-500">{emp.level}</p>
                                                        </td>
                                                        {daysArray.map(day => {
                                                            const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                                            const shifts = schedules[dateStr]?.[empId] || [];
                                                            const hasShifts = shifts.length > 0;
                                                            return (
                                                                <td key={day} onClick={() => openScheduleModal(empId, dateStr)} className={`px-1 py-2 text-center text-[10px] font-medium border-x border-gray-50 cursor-pointer transition-colors hover:ring-2 hover:ring-blue-400 hover:ring-inset ${hasShifts ? 'bg-blue-50/30 text-blue-800' : 'text-gray-300 hover:bg-gray-50'}`}>
                                                                    {hasShifts ? shifts.join(', ') : '+'}
                                                                </td>
                                                            );
                                                        })}
                                                        
                                                        {/* 🌟 ส่วนสรุปข้อมูลต่อท้ายตารางจัดเวร 🌟 */}
                                                        {sortedShiftTypesUsed.map(type => (
                                                            <td key={type} className="px-2 py-2 text-center font-bold text-indigo-700 bg-indigo-50/20 border-x border-gray-100">
                                                                {row.shiftCounts[type] || 0}
                                                            </td>
                                                        ))}
                                                        <td className="px-3 py-2 text-center font-bold text-gray-800 bg-gray-50 border-l border-gray-200">{row.empTotalCredit}</td>
                                                        <td className="px-3 py-2 text-center font-bold text-blue-700 bg-blue-50/50 border-l border-blue-100">{row.otShifts > 0 ? `+${row.otShifts}` : row.otShifts}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            ) : <div className="text-center py-16 text-gray-400 border border-dashed border-gray-200 rounded-xl bg-gray-50"><i className="fa-solid fa-calendar-day text-3xl mb-3 text-gray-300"></i><p className="text-sm">กรุณาเลือก <strong>แผนก</strong> จากแถบด้านบน เพื่อเริ่มจัดการตารางเวร</p></div>}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
