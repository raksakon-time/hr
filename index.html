<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลา รพ.รักษ์สกล</title>
    
    <!-- นำเข้า Google Fonts: Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    boxShadow: {
                        'minimal': '0 4px 20px -2px rgba(0,0,0,0.05)',
                        'floating': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    },
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
    
    <!-- นำเข้า FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; -webkit-font-smoothing: antialiased; color: #0f172a; font-size: 16px; margin: 0; padding: 0;}
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .input-autofill-fix:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px white inset !important; }
        select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%231e3a8a' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
        
        /* 🌟 CSS สำหรับการสั่งพิมพ์ A4 แนวนอน (Print) */
        .print-show { display: none; }
        
        @media print {
            body { font-size: 10pt; background: white; color: black; margin: 0; padding: 0; }
            nav, .print-hide, .bottom-nav-hide { display: none !important; }
            .print-show { display: block !important; }
            main.max-w-7xl { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .print-container { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; max-width: none !important; border-radius: 0 !important; }
            .print-table-wrapper { overflow-x: visible !important; border: none !important; }
            
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th, td { border: 1px solid #94a3b8 !important; padding: 4px 6px !important; font-size: 11px !important; color: black !important; }
            th { background-color: #f1f5f9 !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            td span { background: none !important; border: none !important; color: black !important; box-shadow: none !important; padding: 0 !important; }
            
            @page { size: A4 landscape; margin: 10mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ การตั้งค่า URL และพิกัด
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwN_t3I53y5PoZY0lGVENHiTvR7Ne_K_OxvTjxfCaAUqyLt3lPPLLBY4gQ8XC2V8ddK/exec"; // ⚠️ ใส่ URL ของระบบลงเวลา
        const LEAVE_SYSTEM_URL = "https://script.google.com/macros/s/AKfycbzZvLTxd5MtGo7_5BQISe8b7KU-759zTWbHeIwsnhlGXI-nte9OwWvfporBCtoeAGk3/exec"; // ⚠️ ใส่ URL ของระบบการลา

        const HOSPITAL_LAT = 17.162383247325145;
        const HOSPITAL_LON = 104.14513206230059;
        const ALLOWED_RADIUS = 100;

        const DEPARTMENTS = [
            "HR-IT", "บัญชี", "การเงินผู้ป่วย-สิทธิประโยชน์", "OPD", "IPD", "ห้องยา",
            "ห้องปฏิบัติการทางการแพทย์", "เอกซเรย์", "OR-LR", "แม่บ้าน", "ซักฟอก",
            "หน่วยจ่ายกลาง", "โภชนาการ", "เปล-ยานยนต์", "ช่าง", "เวชระเบียน", "ส่งเสริมสุขภาพ",
            "ADMIN"
        ];

        const DEPT_SHIFTS = {
            "HR-IT": ['ช7', 'ช'],
            "บัญชี": ['ช', 'ช83'],
            "การเงินผู้ป่วย-สิทธิประโยชน์": ['ช', 'ชบ'],
            "OPD": ['ช6', 'ช7', 'ช716','ช917', 'ช21', 'ช', 'ชบ', 'ช9', 'บ', 'ด', 'บ4'],
            "IPD": ['ช', 'บ', 'ด', 'ชบ', 'บด'],
            "ห้องยา": ['ช', 'บ', 'ด', 'ชบ', 'บด', 'ช20'],
            "ห้องปฏิบัติการทางการแพทย์": ['ช', 'ช7', 'ชบ7', 'บ15', 'ช20', 'ช719'],
            "เอกซเรย์": ['ช', 'ชบ', 'ช7','บ'],
            "OR-LR": ['ช'],
            "แม่บ้าน": ['ช7', 'ชบ7', 'บ15'],
            "ซักฟอก": ['ช'],
            "หน่วยจ่ายกลาง": ['ช', 'ช716', 'ช7'],
            "โภชนาการ": ['ช6', 'ช', 'ช616', 'ช618'],
            "เปล-ยานยนต์": ['ช', 'ชบ', 'บ' , 'ด'],
            "ช่าง": ['ช'],
            "เวชระเบียน": ['ช7', 'ช', 'ช20', 'ชบ', 'ช917', 'บ', 'ด'],
            "ส่งเสริมสุขภาพ": ['ช7', 'ช'],
            "ADMIN": ['ช', 'ช83']
        };

        const SHIFT_TYPES = {
            'ด': { start: '00:00', end: '08:00', credit: 1, label: '00.00 - 08.00 (ด)' },
            'ช616': { start: '06:00', end: '16:00', credit: 1.25, label: '06.00 - 16.00 (ช616)' },
            'ช618': { start: '06:00', end: '18:00', credit: 1.5, label: '06.00 - 18.00 (ช618)' },
            'ช619': { start: '06:00', end: '19:00', credit: 1.625, label: '06.00 - 19.00 (ช619)' },
            'ช6': { start: '06:00', end: '14:00', credit: 1, label: '06.00 - 14.00 (ช6)' },
            'ช716': { start: '07:00', end: '16:00', credit: 1.125, label: '07.00 - 16.00 (ช716)' },
            'ช719': { start: '07:00', end: '19:00', credit: 1.5, label: '07.00 - 19.00 (ช719)' },
            'ช7': { start: '07:00', end: '15:00', credit: 1, label: '07.00 - 15.00 (ช7)' },
            'ช21': { start: '07:00', end: '21:00', credit: 1.75, label: '07.00 - 21.00 (ช21)' },
            'ชบ7': { start: '07:00', end: '23:00', credit: 2, label: '07.00 - 23.00 (ชบ7)' },
            'ช': { start: '08:00', end: '16:00', credit: 1, label: '08.00 - 16.00 (ช)' },
            'ชบ': { start: '08:00', end: '00:00', credit: 2, label: '08.00 - 00.00 (ชบ)' },
            'ช20': { start: '08:00', end: '20:00', credit: 1.5, label: '08.00 - 20.00 (ช20)' },
            'ช83': { start: '08:30', end: '16:30', credit: 1, label: '08.30 - 16.30 (ช83)' },
            'ช9': { start: '09:00', end: '21:00', credit: 1.5, label: '09.00 - 21.00 (ช9)' },
            'ช917': { start: '09:00', end: '17:00', credit: 1, label: '09.00 - 17.00 (ช917)' },
            'บ15': { start: '15:00', end: '23:00', credit: 1, label: '15.00 - 23.00 (บ15)' },
            'บ': { start: '16:00', end: '00:00', credit: 1, label: '16.00 - 00.00 (บ)' },
            'บด': { start: '16:00', end: '08:00', credit: 2, label: '16.00 - 08.00 (บด)' },
            'บ4': { start: '17:00', end: '21:00', credit: 0.5, label: '17.00 - 21.00 (บ4)' },
        };

        const getSortedShiftKeys = (deptName) => {
            let keys = Object.keys(SHIFT_TYPES);
            if (deptName && DEPT_SHIFTS[deptName]) {
                keys = keys.filter(k => DEPT_SHIFTS[deptName].includes(k));
            }
            return keys.sort((a, b) => {
                const startCmp = SHIFT_TYPES[a].start.localeCompare(SHIFT_TYPES[b].start);
                if (startCmp !== 0) return startCmp;
                return SHIFT_TYPES[a].label.localeCompare(SHIFT_TYPES[b].label);
            });
        };

        const sendToGoogleSheet = async (action, payload = {}) => {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                const data = await response.json();
                if (data.status === 'error') alert("แจ้งเตือน: " + data.message);
                return data;
            } catch (error) {
                console.error("Error:", error);
                alert("การเชื่อมต่อล้มเหลว: " + error.message);
                return { status: 'error', message: error.message };
            }
        };

        // 🌟 ปรับปรุงฟังก์ชันบันทึกภาพ ให้มีระบบเช็คว่าถ่ายติดจริงหรือไม่
        const captureImage = (videoElement) => {
            if (!videoElement || videoElement.videoWidth === 0 || videoElement.videoHeight === 0) return null;
            const canvas = document.createElement('canvas');
            const scale = 0.5; 
            canvas.width = videoElement.videoWidth * scale;
            canvas.height = videoElement.videoHeight * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        };

        const formatDisplayDate = (dateStr) => {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            const thaiYear = parseInt(year, 10) + 543;
            return `${day}/${month}/${thaiYear}`;
        };

        const formatTime24 = (dateObj) => {
            if (!dateObj) return '';
            const h = String(dateObj.getHours()).padStart(2, '0');
            const m = String(dateObj.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
        };

        const displaySafeTime = (timeStr) => {
            if (!timeStr) return '-';
            if (timeStr.includes('T')) return timeStr.split('T')[1].substring(0, 5) + ' น.';
            return timeStr + ' น.';
        };

        // ==========================================
        // Modals
        // ==========================================
        const MapModal = ({ lat, lon, onClose }) => (
            <div className="fixed inset-0 bg-blue-950/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                <div className="bg-white p-1 rounded-3xl w-full max-w-lg shadow-floating overflow-hidden border border-blue-200">
                    <div className="flex justify-between items-center px-6 py-4 border-b border-blue-50">
                        <h3 className="font-bold text-blue-950 text-lg">พิกัดลงเวลา</h3>
                        <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-full text-blue-400 hover:bg-blue-50 hover:text-blue-700 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <iframe src={`https://maps.google.com/maps?q=${lat},${lon}&hl=th&z=17&output=embed`} width="100%" height="350" frameBorder="0" className="bg-blue-50" />
                </div>
            </div>
        );

        const PhotoModal = ({ record, employees, onClose }) => {
            const emp = employees[record.empId] || {};
            return (
                <div className="fixed inset-0 bg-blue-950/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                    <div className="bg-white p-1 rounded-3xl w-full max-w-md shadow-floating overflow-hidden flex flex-col border border-blue-200">
                        <div className="flex justify-between items-center px-6 py-4 border-b border-blue-50 shrink-0">
                            <h3 className="font-bold text-blue-950 text-lg">รูปสแกนใบหน้า</h3>
                            <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-full text-blue-400 hover:bg-blue-50 hover:text-blue-700 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="p-6 bg-blue-50/50 flex gap-5 h-72 overflow-hidden">
                            {record.photoInUrl ? (
                                <div className="flex-1 flex flex-col">
                                    <p className="text-sm font-bold text-blue-800 uppercase tracking-wider mb-3 text-center">เข้างาน</p>
                                    <iframe src={record.photoInUrl.replace('/view', '/preview')} className="w-full flex-1 border-2 border-blue-200 rounded-2xl bg-white shadow-sm" />
                                </div>
                            ) : <div className="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-blue-200 rounded-2xl bg-white"><i className="fa-regular fa-image text-blue-200 text-3xl"></i></div>}
                            
                            {record.photoOutUrl ? (
                                <div className="flex-1 flex flex-col">
                                    <p className="text-sm font-bold text-blue-800 uppercase tracking-wider mb-3 text-center">ออกงาน</p>
                                    <iframe src={record.photoOutUrl.replace('/view', '/preview')} className="w-full flex-1 border-2 border-blue-200 rounded-2xl bg-white shadow-sm" />
                                </div>
                            ) : <div className="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-blue-200 rounded-2xl bg-white"><i className="fa-regular fa-image text-blue-200 text-3xl"></i></div>}
                        </div>
                        <div className="p-5 border-t border-blue-50 text-base text-blue-800 shrink-0 bg-white">
                            <p><span className="font-bold text-blue-950 text-lg">{emp.fname} {emp.lname}</span> <span className="font-semibold text-blue-600">({record.empId})</span></p>
                            <p className="text-sm mt-1.5 font-medium text-blue-700">วันที่: {formatDisplayDate(record.date)}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Main App Container (Modern Single Entry)
        // ==========================================
        function App() {
            const [currentUser, setCurrentUser] = useState(null); 
            const [activeTab, setActiveTab] = useState('home'); 
            
            const [currentTime, setCurrentTime] = useState(new Date());
            const [records, setRecords] = useState([]);
            const [employees, setEmployees] = useState({});
            const [schedules, setSchedules] = useState({});
            const [isLoading, setIsLoading] = useState(true);
            const [settings, setSettings] = useState({ standardWorkDays: {} });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const fetchInitialData = async () => {
                    if (GAS_URL.includes("ใส่_URL")) {
                        setIsLoading(false); return;
                    }
                    const res = await sendToGoogleSheet('getInitialData');
                    if (res.status === 'success') {
                        setEmployees(res.data.employees || {});
                        setRecords(res.data.records || []);
                        setSchedules(res.data.schedules || {});
                        if (res.data.settings) setSettings(res.data.settings);
                    }
                    setIsLoading(false);
                };
                fetchInitialData();
            }, []);

            const formatDateForInput = (date) => {
                const d = new Date(date);
                const month = '' + (d.getMonth() + 1);
                const day = '' + d.getDate();
                const year = d.getFullYear();
                return [year, month.padStart(2, '0'), day.padStart(2, '0')].join('-');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setActiveTab('home');
            };

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                    <i className="fa-solid fa-spinner fa-spin text-5xl text-blue-500 mb-4"></i>
                    <h2 className="text-xl font-bold text-blue-900 mt-4">กำลังเชื่อมต่อฐานข้อมูล...</h2>
                </div>
            );

            // 1. หน้าลงทะเบียน
            if (!currentUser && activeTab === 'register') {
                return <RegisterView employees={employees} setEmployees={setEmployees} onCancel={() => setActiveTab('home')} sendToGoogleSheet={sendToGoogleSheet} />;
            }

            // 2. หน้าเข้าสู่ระบบ
            if (!currentUser) {
                return <UnifiedLoginView employees={employees} onLogin={(user) => setCurrentUser(user)} onRegisterClick={() => setActiveTab('register')} />;
            }

            // 3. หน้า Dashboard 
            const isManager = currentUser.level === 'หัวหน้า' || currentUser.dept === 'ADMIN';
            const role = currentUser.dept === 'ADMIN' ? 'admin' : (currentUser.level === 'หัวหน้า' ? 'supervisor' : 'employee');
            
            // ระบบดึงรูปโปรไฟล์อัจฉริยะ (ใช้รูปที่สแกนเข้างานล่าสุดมาทำเป็นโปรไฟล์)
            const getDriveImageUrl = (url) => {
                if (!url) return null;
                const match = url.match(/[-\w]{25,}/);
                if (match && match[0]) return `https://drive.google.com/uc?export=view&id=${match[0]}`;
                return url;
            };
            
            const latestRecordWithPhoto = records.filter(r => r.empId === currentUser.id && r.photoInUrl).sort((a,b) => b.id.localeCompare(a.id))[0];
            const defaultAvatarUrl = `https://ui-avatars.com/api/?name=${currentUser.fname}+${currentUser.lname}&background=1e3a8a&color=fff&size=150&font-size=0.33`;
            
            const avatarUrl = latestRecordWithPhoto ? getDriveImageUrl(latestRecordWithPhoto.photoInUrl) : defaultAvatarUrl;

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 pb-20 relative">
                    {/* ส่วน Header */}
                    <div className="bg-blue-950 text-white rounded-b-[2.5rem] shadow-floating pb-8 pt-10 px-6 relative print-hide">
                        <button onClick={handleLogout} className="absolute top-6 right-6 text-blue-200 hover:text-white transition-colors flex items-center">
                            <i className="fa-solid fa-arrow-right-from-bracket text-xl mr-2"></i> ออกจากระบบ
                        </button>
                        <div className="text-center">
                            <div className="w-24 h-24 mx-auto bg-white rounded-full p-1 shadow-lg mb-4">
                                <img src={avatarUrl} alt="Profile" className="w-full h-full rounded-full object-cover" />
                            </div>
                            <h2 className="text-2xl font-bold">{currentUser.fname} {currentUser.lname}</h2>
                            <p className="text-blue-200 text-sm mt-1 font-semibold tracking-wide flex items-center justify-center flex-wrap gap-3">
                                <span><i className="fa-regular fa-id-badge mr-1.5"></i>{currentUser.id}</span>
                                <span><i className="fa-solid fa-briefcase mr-1.5"></i>{currentUser.dept}</span> 
                                {isManager && <span className="bg-amber-500 text-white px-2 py-0.5 rounded text-xs"><i className="fa-solid fa-star mr-1"></i>{role === 'admin' ? 'แอดมิน' : 'หัวหน้า'}</span>}
                            </p>
                        </div>
                    </div>

                    {/* ส่วนพื้นที่ใช้งาน */}
                    <main className="flex-grow w-full max-w-7xl mx-auto -mt-6 z-10 px-4 sm:px-6 lg:px-8">
                        {activeTab === 'home' && <ActionPanelView currentUser={currentUser} currentTime={currentTime} records={records} setRecords={setRecords} schedules={schedules} formatDateForInput={formatDateForInput} sendToGoogleSheet={sendToGoogleSheet} />}
                        {activeTab === 'calendar' && <MyCalendarView currentUser={currentUser} schedules={schedules} />}
                        {activeTab === 'history' && <MyHistoryView currentUser={currentUser} records={records} formatDateForInput={formatDateForInput} currentTime={currentTime} />}
                        {activeTab === 'manager' && isManager && <ReportView role={role} user={currentUser} records={records} setRecords={setRecords} employees={employees} schedules={schedules} setSchedules={setSchedules} sendToGoogleSheet={sendToGoogleSheet} settings={settings} setSettings={setSettings} />}
                    </main>

                    {/* ปุ่มลอย สลับไป ระบบการลา (Leave Flow Pro) */}
                    <a href={LEAVE_SYSTEM_URL} target="_blank" className="fixed bottom-24 right-4 sm:bottom-6 sm:right-6 bg-gradient-to-r from-pink-600 to-rose-500 text-white px-4 py-3 rounded-full shadow-[0_8px_20px_-6px_rgba(225,29,72,0.5)] hover:scale-105 transition-transform z-[100] flex items-center gap-2 border-2 border-white/50 backdrop-blur-sm print-hide" style={{ textDecoration: 'none' }}>
                        <i className="fa-solid fa-notes-medical text-lg"></i>
                        <span className="text-sm font-bold tracking-wide">ลางาน</span>
                    </a>

                    {/* เมนูด้านล่าง */}
                    <div className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-safe print-hide bottom-nav-hide z-50">
                        <div className="max-w-md mx-auto flex justify-around p-2">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center justify-center w-full py-2 ${activeTab === 'home' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className={`fa-solid fa-clock text-2xl mb-1 transition-transform ${activeTab === 'home' ? 'scale-110' : ''}`}></i>
                                <span className="text-xs font-bold">ลงเวลา</span>
                            </button>
