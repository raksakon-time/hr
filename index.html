        // ==========================================
        // Views: ฟังก์ชันหน้าสแกนเข้างาน (ล็อกกะตามตารางเวร)
        // ==========================================
        function ClockInModule({ currentUser, currentTime, records, setRecords, schedules, formatDateForInput, sendToGoogleSheet, onDone }) {
            const [selectedShift, setSelectedShift] = useState('');
            const [validShifts, setValidShifts] = useState([]);
            const [locationStatus, setLocationStatus] = useState('checking'); 
            const [currentLocation, setCurrentLocation] = useState(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [result, setResult] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const videoRef = useRef(null);

            useEffect(() => {
                initializeSetup();
            }, []);

            useEffect(() => {
                if (cameraActive && !result && locationStatus === 'ok') {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                        .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                        .catch(() => { setErrorMsg("ไม่สามารถเปิดกล้องได้ โปรดตรวจสอบการอนุญาต"); setCameraActive(false); });
                } else {
                    const stream = videoRef.current?.srcObject;
                    if (stream) stream.getTracks().forEach(track => track.stop());
                }
                return () => {
                     const stream = videoRef.current?.srcObject;
                     if (stream) stream.getTracks().forEach(track => track.stop());
                }
            }, [cameraActive, result, locationStatus]);

            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371; 
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c * 1000; 
            };

            const checkLocation = () => {
                setLocationStatus('checking');
                setErrorMsg('');
                
                if (!navigator.geolocation) { 
                    setErrorMsg("เบราว์เซอร์ไม่รองรับ GPS"); 
                    setLocationStatus('error'); 
                    return; 
                }

                const fallbackTimeout = setTimeout(() => {
                    setErrorMsg("GPS ไม่ตอบสนอง กรุณาตรวจสอบการตั้งค่าตำแหน่ง หรือลองสลับเน็ต");
                    setLocationStatus('error');
                }, 15000);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(fallbackTimeout);
                        const lat = position.coords.latitude; 
                        const lon = position.coords.longitude;
                        setCurrentLocation({ lat, lon });
                        const dist = getDistance(lat, lon, HOSPITAL_LAT, HOSPITAL_LON);
                        
                        if (dist <= ALLOWED_RADIUS) {
                            setLocationStatus('ok');
                            setErrorMsg('');
                        } else { 
                            setErrorMsg(`อยู่นอกพื้นที่ รพ. (${Math.round(dist)}ม.)`); 
                            setLocationStatus('error'); 
                        }
                    },
                    (err) => { 
                        clearTimeout(fallbackTimeout);
                        console.warn("GPS Error:", err);
                        let msg = "ไม่สามารถระบุตำแหน่งได้";
                        if (err.code === 1) msg = "กรุณากดอนุญาตให้เบราว์เซอร์เข้าถึงตำแหน่ง (Location)";
                        if (err.code === 2) msg = "สัญญาณ GPS ขัดข้อง หรือมือถือปิด GPS ไว้";
                        if (err.code === 3) msg = "หมดเวลาการค้นหาพิกัด (Timeout)";
                        setErrorMsg(msg); 
                        setLocationStatus('error'); 
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const initializeSetup = () => {
                const todayStr = formatDateForInput(currentTime);
                const activeRecord = records.find(r => r.empId === currentUser.id && (r.date === todayStr || (currentTime.getHours() <= 8 && r.date === formatDateForInput(new Date(currentTime.getTime() - 86400000)))) && !r.timeOut);
                
                if (activeRecord) { 
                    setErrorMsg(`ค้างลงเวลาออกกะ "${SHIFT_TYPES[activeRecord.shiftId]?.label || activeRecord.shiftId}" กรุณาลงเวลาออกก่อน`); 
                    setLocationStatus('error'); 
                    return; 
                }

                const schedObjToday = schedules[todayStr]?.[currentUser.id];
                let scheduledShifts = schedObjToday?.shifts || (Array.isArray(schedObjToday) ? schedObjToday : []);
                
                if (currentTime.getHours() >= 0 && currentTime.getHours() <= 3) {
                    const yesterday = new Date(currentTime);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = formatDateForInput(yesterday);
                    
                    const yestObj = schedules[yesterdayStr]?.[currentUser.id];
                    const yesterdayShifts = yestObj?.shifts || (Array.isArray(yestObj) ? yestObj : []);
                    if (yesterdayShifts.length > 0) scheduledShifts = yesterdayShifts;
                }

                const validScheduledShifts = scheduledShifts.filter(s => s && !['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(s));
                setValidShifts(validScheduledShifts);

                if(validScheduledShifts.length > 0) { 
                    setSelectedShift(validScheduledShifts[0]); 
                    checkLocation(); 
                } else {
                    setSelectedShift('');
                    setErrorMsg('ไม่อนุญาต: ไม่พบตารางเวรของคุณในระบบ กรุณาติดต่อหัวหน้างานหรือ HR');
                    setLocationStatus('error');
                }
            };

            const handleClockIn = async () => {
                setErrorMsg(''); setIsScanning(true);
                const todayStr = formatDateForInput(currentTime);
                let targetDate = todayStr; 
                
                const schedObjToday = schedules[todayStr]?.[currentUser.id];
                let scheduledShifts = schedObjToday?.shifts || (Array.isArray(schedObjToday) ? schedObjToday : []);
                
                if (currentTime.getHours() >= 0 && currentTime.getHours() <= 3) {
                    const yesterday = new Date(currentTime); yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = formatDateForInput(yesterday);
                    const yestObj = schedules[yesterdayStr]?.[currentUser.id];
                    const yesterdayShifts = yestObj?.shifts || (Array.isArray(yestObj) ? yestObj : []);
                    
                    if (yesterdayShifts.includes(selectedShift)) {
                        scheduledShifts = yesterdayShifts; targetDate = yesterdayStr; 
                    }
                }
                
                const validScheduledShifts = scheduledShifts.filter(s => s && !['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(s));
                if (validScheduledShifts.length > 0 && !validScheduledShifts.includes(selectedShift)) {
                    setErrorMsg(`ไม่อนุญาต: กะที่เลือกไม่ตรงกับตารางเวร กรุณาติดต่อหัวหน้างานหรือ HR`); setIsScanning(false); setCameraActive(false); return; 
                }
                if (validScheduledShifts.length === 0) {
                    setErrorMsg(`ไม่อนุญาต: ไม่พบตารางเวรของคุณในระบบ กรุณาติดต่อหัวหน้างานหรือ HR`); setIsScanning(false); setCameraActive(false); return; 
                }

                const photoBase64 = captureImage(videoRef.current);
                // 🌟 ระบบป้องกัน ถ่ายรูปไม่ติดให้หยุดการส่งข้อมูล
                if (!photoBase64) {
                    setErrorMsg(`เกิดข้อผิดพลาดในการจับภาพ กรุณารอให้กล้องแสดงภาพชัดเจนก่อนกดสแกน`); 
                    setIsScanning(false); 
                    return; 
                }

                const shiftData = SHIFT_TYPES[selectedShift];
                const [shiftHour, shiftMinute] = shiftData.start.split(':').map(Number);
                const actualMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                const deadlineMins = (shiftHour * 60) + shiftMinute + 5; 
                const isLate = actualMins > deadlineMins && actualMins < deadlineMins + 720; 
                const lateMinutes = isLate ? (actualMins - deadlineMins) : 0;
                const timeInStr = formatTime24(currentTime);

                const newRecord = {
                    id: Date.now().toString(), date: targetDate, empId: currentUser.id, shiftId: selectedShift, 
                    timeIn: timeInStr, timeOut: null, isLate: isLate, lateMinutes: lateMinutes, credit: shiftData.credit,
                    lat: currentLocation?.lat, lon: currentLocation?.lon, photoBase64: photoBase64
                };

                const res = await sendToGoogleSheet('clockIn', newRecord);
                if (res.status === 'success') {
                    setRecords([...records, newRecord]);
                    setResult({ ...newRecord, shiftName: shiftData.label }); 
                } else setErrorMsg("บันทึกไม่สำเร็จ: " + res.message);
                setIsScanning(false); setCameraActive(false);
            };

            if (result) return (
                <div className="bg-white rounded-3xl p-8 sm:p-10 shadow-minimal border border-slate-100 text-center animate-fade-in">
                    <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-check text-4xl text-emerald-600"></i></div>
                    <h2 className="text-2xl font-bold text-slate-800">เข้างานสำเร็จ</h2>
                    <div className="my-8 p-6 bg-slate-50 rounded-2xl border border-slate-200">
                        <p className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">เวลาเข้างาน</p>
                        <p className="text-5xl font-extrabold text-emerald-600 tracking-tight mb-4">{displaySafeTime(result.timeIn)}</p>
                        <div className="inline-flex items-center gap-2 text-base font-bold text-slate-700 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                            <i className="fa-solid fa-calendar-day text-emerald-500"></i> กะ: {result.shiftName}
                        </div>
                        <p className="text-sm font-semibold text-slate-500 mt-3">บันทึกลงวันที่: {formatDisplayDate(result.date)}</p>
                    </div>
                    {result.isLate && (
                        <div className="mb-8 inline-flex items-center gap-2 bg-red-50 text-red-700 px-5 py-2.5 rounded-full text-base font-bold border border-red-100">
                            <i className="fa-regular fa-clock"></i> สาย {result.lateMinutes} นาที
                        </div>
                    )}
                    <button onClick={onDone} className="w-full p-4 rounded-2xl border-2 border-slate-200 text-slate-700 font-bold text-lg hover:bg-slate-50 transition-colors">เสร็จสิ้น</button>
                </div>
            );

            return (
                <div className="bg-white rounded-3xl shadow-minimal border border-slate-100 overflow-hidden animate-fade-in">
                    <div className="px-8 pt-8 pb-4 text-center border-b border-slate-50">
                        <h2 className="text-xl font-bold text-emerald-600 mb-2">เข้างาน</h2>
                    </div>
                    <div className="p-6 space-y-6">
                        {errorMsg && <div className="p-4 bg-red-50 text-red-700 rounded-xl text-sm font-bold flex items-start gap-3 border border-red-100"><i className="fa-solid fa-circle-exclamation mt-1"></i> <span>{errorMsg}</span></div>}
                        
                        <div>
                            <label className="block text-sm font-bold text-slate-600 mb-2 ml-1">กะการทำงาน (ล็อกตามตารางเวร)</label>
                            {validShifts.length > 0 ? (
                                <select value={selectedShift} onChange={(e) => setSelectedShift(e.target.value)} className="w-full p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50 outline-none font-bold text-emerald-900 text-base focus:border-emerald-500 transition-colors cursor-pointer appearance-none">
                                    {validShifts.map(key => <option key={key} value={key}>{SHIFT_TYPES[key]?.label || key}</option>)}
                                </select>
                            ) : (
                                <div className="w-full p-4 border-2 border-red-200 rounded-2xl bg-red-50 text-red-700 font-bold text-base text-center shadow-sm">
                                    ไม่พบตารางเวรในระบบ
                                </div>
                            )}
                        </div>
                        
                        <div className={`p-4 rounded-2xl flex items-center gap-3 text-sm font-bold border-2 ${locationStatus === 'ok' ? 'bg-green-50 border-green-200 text-green-800' : locationStatus === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                            {locationStatus === 'ok' ? <><i className="fa-solid fa-location-dot text-lg"></i> พิกัดถูกต้อง (ใน รพ.)</> : locationStatus === 'error' ? <><i className="fa-solid fa-location-xmark text-lg"></i> พิกัดอยู่นอกพื้นที่ 
                                <button onClick={checkLocation} className="ml-auto bg-red-100 px-3 py-1 rounded text-red-800 font-bold hover:bg-red-200 shadow-sm transition-colors">ลองใหม่</button></> 
                                : <><i className="fa-solid fa-spinner fa-spin text-lg"></i> กำลังตรวจสอบพิกัด...</>}
                        </div>
                        
                        <div className="border-2 border-dashed border-slate-200 rounded-2xl h-64 flex items-center justify-center bg-slate-50 overflow-hidden relative group">
                            {cameraActive ? <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1]" /> : 
                            <button onClick={() => setCameraActive(true)} disabled={locationStatus !== 'ok' || validShifts.length === 0} className={`flex flex-col items-center transition-colors ${locationStatus === 'ok' && validShifts.length > 0 ? 'text-emerald-600 hover:text-emerald-700' : 'text-slate-400'}`}>
                                <div className="w-16 h-16 rounded-full bg-white border-2 border-slate-200 flex items-center justify-center mb-3 shadow-sm group-hover:shadow-md transition-all"><i className="fa-solid fa-camera text-2xl"></i></div>
                                <span className="text-sm font-bold">เปิดกล้องสแกนใบหน้า</span>
                            </button>}
                        </div>
                        
                        <button onClick={handleClockIn} disabled={!cameraActive || isScanning || locationStatus !== 'ok' || validShifts.length === 0} className={`w-full p-4 rounded-2xl font-bold text-lg text-white transition-all ${(cameraActive && locationStatus === 'ok' && validShifts.length > 0) ? 'bg-emerald-600 hover:bg-emerald-700 shadow-[0_8px_20px_-6px_rgba(5,150,105,0.5)]' : 'bg-slate-300 text-white cursor-not-allowed'}`}>
                            {isScanning ? 'กำลังบันทึก...' : 'สแกนหน้า ยืนยันเข้างาน'}
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Views: ฟังก์ชันหน้าสแกนออกงาน
        // ==========================================
        function ClockOutModule({ currentUser, currentTime, records, setRecords, formatDateForInput, sendToGoogleSheet, onDone }) {
            const [outDate, setOutDate] = useState(formatDateForInput(currentTime));
            const [foundRecord, setFoundRecord] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [showEarlyWarning, setShowEarlyWarning] = useState(false);
            const [successResult, setSuccessResult] = useState(null);
            const videoRef = useRef(null);

            useEffect(() => {
                searchRecord(outDate);
                // eslint-disable-next-line
            }, []);

            useEffect(() => {
                if (cameraActive && !successResult) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                        .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                        .catch(() => { setErrorMsg("ไม่สามารถเข้าถึงกล้องได้"); setCameraActive(false); });
                } else {
                    const stream = videoRef.current?.srcObject;
                    if (stream) stream.getTracks().forEach(track => track.stop());
                }
                return () => {
                     const stream = videoRef.current?.srcObject;
                     if (stream) stream.getTracks().forEach(track => track.stop());
                }
            }, [cameraActive, successResult]);

            const searchRecord = (searchDate) => {
                setErrorMsg(''); setFoundRecord(null); setCameraActive(false);
                const record = records.find(r => r.empId === currentUser.id && r.date === searchDate && !r.timeOut);
                if (!record) { setErrorMsg(`ไม่พบประวัติค้างลงเวลาออกของวันที่กำหนด`); return; }
                setFoundRecord(record);
            };

            const handleDateChange = (e) => {
                const newDate = e.target.value;
                setOutDate(newDate);
                searchRecord(newDate);
            };

            const handleClockOutAttempt = () => {
                if (!cameraActive) { setErrorMsg("กรุณาเปิดกล้อง"); return; }
                const shiftData = SHIFT_TYPES[foundRecord.shiftId];
                let shiftEndStr = shiftData.end === '24:00' ? '23:59' : shiftData.end;
                const [endH, endM] = shiftEndStr.split(':').map(Number);
                const [startH, startM] = shiftData.start.split(':').map(Number);
                
                const endTime = new Date(currentTime); 
                endTime.setHours(endH, endM, 0, 0);
                if (endH < startH) if (currentTime.getHours() >= 12) endTime.setDate(endTime.getDate() + 1);

                if (currentTime < endTime) setShowEarlyWarning(true);
                else processClockOut();
            };

            const processClockOut = async () => {
                setShowEarlyWarning(false); setIsScanning(true); setErrorMsg('');
                const photoBase64 = captureImage(videoRef.current);
                // 🌟 ระบบป้องกัน ถ่ายรูปไม่ติดให้หยุดการส่งข้อมูล
                if (!photoBase64) {
                    setErrorMsg(`เกิดข้อผิดพลาดในการจับภาพ กรุณารอให้กล้องแสดงภาพชัดเจนก่อนกดสแกน`); 
                    setIsScanning(false); 
                    return; 
                }

                const timeOutStr = formatTime24(currentTime);
                
                const res = await sendToGoogleSheet('clockOut', { id: foundRecord.id, timeOut: timeOutStr, photoBase64: photoBase64 });
                if (res.status === 'success') {
                    setRecords(records.map(r => r.id === foundRecord.id ? { ...r, timeOut: timeOutStr } : r));
                    setSuccessResult({ timeOut: timeOutStr, shiftName: SHIFT_TYPES[foundRecord.shiftId]?.label });
                } else setErrorMsg("เกิดข้อผิดพลาด: " + res.message);
                setIsScanning(false); setCameraActive(false);
            };

            if (successResult) return (
                <div className="bg-white rounded-3xl p-8 sm:p-10 shadow-minimal border border-slate-100 text-center animate-fade-in">
                    <div className="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-arrow-right-from-bracket text-4xl text-rose-600"></i></div>
                    <h2 className="text-2xl font-bold text-slate-800">ออกงานสำเร็จ</h2>
                    <div className="my-8 p-6 bg-slate-50 rounded-2xl border border-slate-200">
                        <p className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">เวลาออกงาน</p>
                        <p className="text-5xl font-extrabold text-rose-600 tracking-tight mb-4">{displaySafeTime(successResult.timeOut)}</p>
                        <div className="inline-flex items-center gap-2 text-base font-bold text-slate-700 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                            <i className="fa-solid fa-calendar-day text-rose-500"></i> กะ: {successResult.shiftName}
                        </div>
                    </div>
                    <button onClick={onDone} className="w-full p-4 rounded-2xl border-2 border-slate-200 text-slate-700 font-bold text-lg hover:bg-slate-50 transition-colors">เสร็จสิ้น</button>
                </div>
            );

            return (
                <div className="bg-white rounded-3xl shadow-minimal border border-slate-100 overflow-hidden animate-fade-in">
                    <div className="px-8 pt-8 pb-4 text-center border-b border-slate-50">
                        <h2 className="text-xl font-bold text-rose-600 mb-2">ออกงาน</h2>
                    </div>
                    <div className="p-6 space-y-6">
                        {errorMsg && <div className="p-4 bg-red-50 text-red-700 rounded-xl text-sm font-bold flex items-start gap-3 border border-red-100"><i className="fa-solid fa-circle-exclamation mt-1"></i> <span>{errorMsg}</span></div>}
                        
                        <div>
                            <label className="block text-sm font-bold text-slate-600 mb-2 ml-1">วันที่เข้างาน (ถ้าย้อนวันให้กดเปลี่ยน)</label>
                            <input type="date" value={outDate} onChange={handleDateChange} className="w-full p-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-bold text-slate-800 text-base focus:border-rose-400 transition-colors" />
                        </div>

                        {!foundRecord ? (
                            <div className="text-center py-10 bg-slate-50 rounded-2xl border border-slate-200">
                                <i className="fa-solid fa-magnifying-glass text-4xl text-slate-300 mb-3"></i>
                                <p className="text-slate-500 font-medium">ไม่พบประวัติเข้างานของวันที่กำหนด</p>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-2xl flex items-center justify-between">
                                    <div>
                                        <p className="text-xs font-bold text-slate-400 uppercase">กะที่บันทึกไว้</p>
                                        <p className="font-bold text-slate-800 mt-1">{SHIFT_TYPES[foundRecord.shiftId]?.label}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-xs font-bold text-slate-400 uppercase">เวลาเข้า</p>
                                        <p className="font-bold text-emerald-600 mt-1">{displaySafeTime(foundRecord.timeIn)}</p>
                                    </div>
                                </div>

                                <div className="border-2 border-dashed border-slate-200 rounded-2xl h-64 flex items-center justify-center bg-slate-50 overflow-hidden relative group">
                                    {cameraActive ? <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1]" /> : 
                                    <button onClick={() => setCameraActive(true)} className="flex flex-col items-center text-rose-500 hover:text-rose-600 transition-colors">
                                        <div className="w-16 h-16 rounded-full bg-white border-2 border-slate-200 flex items-center justify-center mb-3 shadow-sm group-hover:shadow-md transition-all"><i className="fa-solid fa-camera text-2xl"></i></div>
                                        <span className="text-sm font-bold">เปิดกล้องสแกนหน้า</span>
                                    </button>}
                                </div>

                                {showEarlyWarning ? (
                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-200 text-center">
                                        <p className="font-bold text-amber-900 mb-4 text-base"><i className="fa-solid fa-triangle-exclamation mr-2"></i>ออกก่อนเวลาเลิกกะ ยืนยันหรือไม่?</p>
                                        <div className="flex gap-3">
                                            <button onClick={processClockOut} className="flex-1 bg-amber-600 text-white rounded-xl py-3 text-base font-bold shadow-sm hover:bg-amber-700">ยืนยันออก</button>
                                            <button onClick={() => setShowEarlyWarning(false)} className="flex-1 bg-white border-2 border-slate-200 text-slate-700 rounded-xl py-3 text-base font-bold hover:bg-slate-50">ยกเลิก</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={handleClockOutAttempt} disabled={!cameraActive || isScanning} className={`w-full p-4 rounded-2xl font-bold text-lg text-white transition-all ${cameraActive ? 'bg-rose-600 hover:bg-rose-700 shadow-[0_8px_20px_-6px_rgba(225,29,72,0.5)]' : 'bg-slate-300 text-white cursor-not-allowed'}`}>
                                        {isScanning ? 'กำลังบันทึก...' : 'สแกนหน้า ยืนยันออกงาน'}
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // Views: ปฏิทินเวรของฉัน (My Schedule)
        // ==========================================
        function MyCalendarView({ currentUser, schedules }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = new Date(year, month, 1).getDay(); // 0 (Sun) to 6 (Sat)

            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

            const blanks = Array.from({ length: firstDayOfMonth }, (_, i) => i);
            const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);

            const todayDate = new Date();
            const todayStr = `${todayDate.getFullYear()}-${String(todayDate.getMonth() + 1).padStart(2, '0')}-${String(todayDate.getDate()).padStart(2, '0')}`;

            return (
                <div className="max-w-2xl mx-auto space-y-6">
                    <div className="bg-white rounded-3xl p-5 sm:p-6 shadow-minimal border border-slate-100 flex items-center justify-between mt-6">
                        <button onClick={prevMonth} className="w-10 h-10 rounded-full bg-slate-50 text-slate-600 hover:bg-blue-100 hover:text-blue-700 flex items-center justify-center transition-colors"><i className="fa-solid fa-chevron-left"></i></button>
                        <h2 className="text-lg sm:text-xl font-bold text-slate-800">{monthNames[month]} {year + 543}</h2>
                        <button onClick={nextMonth} className="w-10 h-10 rounded-full bg-slate-50 text-slate-600 hover:bg-blue-100 hover:text-blue-700 flex items-center justify-center transition-colors"><i className="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <div className="bg-white rounded-3xl p-4 sm:p-6 shadow-minimal border border-slate-100">
                        <div className="grid grid-cols-7 gap-1 sm:gap-2 mb-2 border-b border-slate-100 pb-2">
                            {['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'].map((d, i) => (
                                <div key={d} className={`text-center text-xs font-bold py-1 ${i === 0 || i === 6 ? 'text-rose-500' : 'text-slate-500'}`}>{d}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-1 sm:gap-2">
                            {blanks.map(b => <div key={`blank-${b}`} className="p-1 sm:p-2 min-h-[60px] sm:min-h-[80px]"></div>)}
                            {days.map(day => {
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                const dayShifts = schedules[dateStr]?.[currentUser.id]?.shifts || [];
                                const isToday = dateStr === todayStr;

                                return (
                                    <div key={day} onClick={() => setSelectedDate({ dateStr, day, dayShifts })} className={`relative flex flex-col items-center justify-start p-1 sm:p-1.5 min-h-[60px] sm:min-h-[80px] rounded-xl cursor-pointer border-2 transition-all hover:border-blue-400 hover:shadow-md ${isToday ? 'bg-blue-50 border-blue-300' : 'bg-white border-slate-100'}`}>
                                        <span className={`text-xs sm:text-sm font-bold ${isToday ? 'text-blue-700' : 'text-slate-700'} mb-1`}>{day}</span>
                                        <div className="flex flex-col gap-0.5 w-full items-center overflow-hidden">
                                            {dayShifts.map((s, i) => {
                                                const isLeave = ['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(s);
                                                const chipColor = isLeave ? 'bg-amber-100 text-amber-800' : 'bg-blue-100 text-blue-800';
                                                return <span key={i} className={`text-[9px] sm:text-[10px] font-bold ${chipColor} px-0.5 sm:px-1 py-0.5 rounded w-full text-center truncate`}>{s}</span>
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Modal แสดงรายละเอียดเวร */}
                    {selectedDate && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={() => setSelectedDate(null)}>
                            <div className="bg-white rounded-[2rem] w-full max-w-sm shadow-floating overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-slate-800 text-xl">รายละเอียดเวร</h3>
                                    <button onClick={() => setSelectedDate(null)} className="w-8 h-8 rounded-full bg-white text-slate-400 hover:text-rose-500 shadow-sm flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-8 text-center">
                                    <div className="text-5xl font-extrabold text-blue-600 mb-2">{selectedDate.day}</div>
                                    <div className="text-slate-500 font-medium mb-6">{monthNames[month]} {year + 543}</div>
                                    
                                    <div className="space-y-3">
                                        {selectedDate.dayShifts.length > 0 ? (
                                            selectedDate.dayShifts.map((s, i) => {
                                                const isLeave = ['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(s);
                                                return (
                                                    <div key={i} className={`border-2 rounded-xl p-4 flex flex-col items-center justify-center gap-1 ${isLeave ? 'bg-amber-50 border-amber-100' : 'bg-blue-50 border-blue-100'}`}>
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <i className={`fa-solid ${isLeave ? 'fa-bed text-amber-500' : 'fa-clock text-blue-500'} text-xl`}></i>
                                                            <span className={`font-bold text-xl ${isLeave ? 'text-amber-900' : 'text-blue-900'}`}>{s}</span>
                                                        </div>
                                                        <span className="font-semibold text-slate-600 text-sm">{SHIFT_TYPES[s]?.label || 'ไม่ระบุเวลา'}</span>
                                                    </div>
                                                )
                                            })
                                        ) : (
                                            <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-6 text-slate-400 font-bold">
                                                ไม่มีตารางเวรในวันนี้
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // Views: ประวัติส่วนตัวพนักงาน
        // ==========================================
        function MyHistoryView({ currentUser, records, formatDateForInput, currentTime }) {
            const [filterMonth, setFilterMonth] = useState(`${currentTime.getFullYear()}-${String(currentTime.getMonth() + 1).padStart(2, '0')}`);

            const myRecords = records.filter(r => r.empId === currentUser.id && r.date.startsWith(filterMonth)).sort((a, b) => b.date.localeCompare(a.date) || b.timeIn.localeCompare(a.timeIn));

            const totalCredit = myRecords.reduce((sum, r) => sum + (r.credit || 0), 0);
            const totalLate = myRecords.filter(r => r.isLate).length;

            return (
                <div className="max-w-2xl mx-auto space-y-6">
                    <div className="bg-white rounded-3xl p-6 shadow-minimal border border-slate-100 flex flex-wrap gap-4 items-center justify-between mt-6">
                        <h2 className="text-xl font-bold text-slate-800">ประวัติการลงเวลา</h2>
                        <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="p-3 border-2 border-slate-200 rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:border-blue-500" />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-blue-600 text-white rounded-3xl p-6 shadow-md flex flex-col justify-center">
                            <p className="text-blue-200 text-sm font-bold mb-1">รวมเครดิตเวร</p>
                            <p className="text-4xl font-extrabold">{totalCredit}</p>
                        </div>
                        <div className="bg-white rounded-3xl p-6 shadow-minimal border border-slate-100 flex flex-col justify-center">
                            <p className="text-slate-500 text-sm font-bold mb-1">สถิติมาสาย</p>
                            <p className="text-4xl font-extrabold text-red-500">{totalLate} <span className="text-lg text-slate-400 font-semibold">ครั้ง</span></p>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {myRecords.map(r => (
                            <div key={r.id} className="bg-white rounded-3xl p-5 shadow-minimal border border-slate-100 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                                <div>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="bg-blue-100 text-blue-800 text-xs font-extrabold px-2 py-1 rounded-lg">{formatDisplayDate(r.date)}</span>
                                        <span className="font-bold text-slate-700">{SHIFT_TYPES[r.shiftId]?.label}</span>
                                    </div>
                                    <div className="text-slate-500 text-sm font-medium flex items-center gap-4">
                                        <span><i className="fa-solid fa-arrow-right-to-bracket text-emerald-500 mr-1"></i> {displaySafeTime(r.timeIn)}</span>
                                        <span><i className="fa-solid fa-arrow-right-from-bracket text-rose-500 mr-1"></i> {displaySafeTime(r.timeOut)}</span>
                                    </div>
                                </div>
                                <div className="text-right flex sm:flex-col items-center sm:items-end justify-between w-full sm:w-auto">
                                    {r.isLate ? <span className="text-red-600 font-bold bg-red-50 px-3 py-1 rounded-xl text-sm border border-red-100 whitespace-nowrap">สาย {r.lateMinutes} นาที</span> : <span className="text-emerald-600 font-bold bg-emerald-50 px-3 py-1 rounded-xl text-sm border border-emerald-100">ปกติ</span>}
                                    <span className="text-slate-400 text-xs font-bold mt-2 hidden sm:block">เครดิต: {r.credit}</span>
                                </div>
                            </div>
                        ))}
                        {myRecords.length === 0 && (
                            <div className="text-center py-12 bg-white rounded-3xl border border-slate-100 shadow-minimal">
                                <i className="fa-solid fa-inbox text-5xl text-slate-200 mb-4"></i>
                                <p className="text-slate-500 font-medium">ไม่พบประวัติในเดือนนี้</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // Views: พื้นที่จัดการของแอดมิน / หัวหน้างาน (Admin/Supervisor)
        // ==========================================
        function ReportView({ role, user, records, setRecords, employees, schedules, setSchedules, sendToGoogleSheet, settings, setSettings }) {
            const [adminTab, setAdminTab] = useState(role === 'supervisor' ? 'summary' : 'logs'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const [matrixMonth, setMatrixMonth] = useState(defaultMonth);
            
            const defaultDept = role === 'supervisor' ? user.dept : '';
            const [filterDept, setFilterDept] = useState(defaultDept);
            const [filterEmp, setFilterEmp] = useState('');
            
            const [localWorkDays, setLocalWorkDays] = useState(22);
            useEffect(() => {
                if (settings && settings.standardWorkDays && settings.standardWorkDays[matrixMonth]) {
                    setLocalWorkDays(parseInt(settings.standardWorkDays[matrixMonth]));
                } else {
                    setLocalWorkDays(22);
                }
            }, [settings, matrixMonth]);
            
            const [selectedMapRecord, setSelectedMapRecord] = useState(null);
            const [selectedPhotoRecord, setSelectedPhotoRecord] = useState(null);
            const [editModalData, setEditModalData] = useState(null);
            const [addModalData, setAddModalData] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [scheduleModalData, setScheduleModalData] = useState(null);
            
            // 🌟 State สำหรับระบบจัดเวรอัตโนมัติ (Auto Schedule)
            const [autoScheduleModal, setAutoScheduleModal] = useState(false);
            const [autoScheduleData, setAutoScheduleData] = useState({ empId: 'all', shiftId: '', dayPattern: 'all', overwrite: false, assignMode: 'all', requiredCount: 1 });

            const filteredRecords = records.filter(r => {
                const emp = employees[r.empId];
                if (!emp) return false;
                let match = true;
                if (startDate && r.date < startDate) match = false;
                if (endDate && r.date > endDate) match = false;
                if (filterDept && emp.dept !== filterDept) match = false;
                if (filterEmp) {
                    const search = filterEmp.toLowerCase();
                    const name = `${emp.fname} ${emp.lname}`.toLowerCase();
                    if (!r.empId.toLowerCase().includes(search) && !name.includes(search)) match = false;
                }
                return match;
            });

            const totalCredits = filteredRecords.reduce((sum, r) => sum + (r.credit || 0), 0);
            const totalLateMinutes = filteredRecords.reduce((sum, r) => sum + (r.isLate ? (Number(r.lateMinutes) || 0) : 0), 0);

            const matrixYear = parseInt(matrixMonth.split('-')[0], 10);
            const matrixMonthNum = parseInt(matrixMonth.split('-')[1], 10);
            const daysInMonth = new Date(matrixYear, matrixMonthNum, 0).getDate();
            const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

            const matrixEmployees = Object.keys(employees).filter(id => {
                const emp = employees[id];
                if (filterDept && emp.dept !== filterDept) return false;
                if (filterEmp) {
                    const search = filterEmp.toLowerCase();
                    const name = `${emp.fname} ${emp.lname}`.toLowerCase();
                    if (!id.toLowerCase().includes(search) && !name.includes(search)) return false;
                }
                return true;
            });

            const summaryMatrix = matrixEmployees.map(empId => {
                const empRecords = records.filter(r => r.empId === empId && r.date.startsWith(matrixMonth));
                const shiftsByDay = {};
                const shiftCounts = {};
                let empTotalCredit = 0;
                let empTotalLate = 0;

                const todayY = now.getFullYear();
                const todayM = String(now.getMonth() + 1).padStart(2, '0');
                const todayD = String(now.getDate()).padStart(2, '0');
                const todayStr = `${todayY}-${todayM}-${todayD}`;

                daysArray.forEach(day => {
                    const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayRecords = empRecords.filter(r => r.date === dateStr);
                    
                    const schedObj = schedules[dateStr]?.[empId];
                    const scheduledShifts = schedObj?.shifts || (Array.isArray(schedObj) ? schedObj : []);

                    let shiftDisplay = '-';
                    let isAbsent = false;
                    let uiElements = []; 

                    if (adminTab === 'schedules') {
                        if (scheduledShifts.length > 0) {
                            shiftDisplay = scheduledShifts.join(', ');
                            scheduledShifts.forEach(s => {
                                if (s) shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                                if (SHIFT_TYPES[s]) empTotalCredit += SHIFT_TYPES[s].credit;
                                else if (['Vac', 'พักร้อน', 'ป่วย', 'ลา'].includes(s)) empTotalCredit += 1;
                            });
                        }
                        shiftsByDay[day] = { display: shiftDisplay, isAbsent: false, uiElements: [] };
                    } else {
                        const workedShifts = dayRecords.map(r => r.shiftId).filter(Boolean);
                        const pendingShifts = scheduledShifts.filter(s => s && !workedShifts.includes(s));
                        let displayArr = [];

                        workedShifts.forEach(s => {
                            shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                            displayArr.push(s);
                            uiElements.push({ shift: s, type: 'worked' });
                        });
                        empTotalCredit += dayRecords.reduce((sum, r) => sum + (r.credit || 0), 0);
                        empTotalLate += dayRecords.reduce((sum, r) => sum + (r.isLate ? Number(r.lateMinutes) : 0), 0);

                        if (dateStr < todayStr) {
                            pendingShifts.forEach(s => {
                                if (['Vac', 'พักร้อน', 'ป่วย', 'ลา', 'Off'].includes(s)) {
                                    shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                                    if (['Vac', 'พักร้อน', 'ป่วย', 'ลา'].includes(s)) empTotalCredit += 1;
                                    displayArr.push(s);
                                    uiElements.push({ shift: s, type: 'leave' });
                                } else {
                                    shiftCounts['ขาด'] = (shiftCounts['ขาด'] || 0) + 1;
                                    isAbsent = true;
                                    displayArr.push(`${s} (ขาด)`);
                                    uiElements.push({ shift: s, type: 'absent' });
                                }
                            });
                        } else {
                            pendingShifts.forEach(s => {
                                shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                                if (SHIFT_TYPES[s]) empTotalCredit += SHIFT_TYPES[s].credit;
                                else if (['Vac', 'พักร้อน', 'ป่วย', 'ลา'].includes(s)) empTotalCredit += 1;
                                displayArr.push(s);
                                uiElements.push({ shift: s, type: 'pending' });
                            });
                        }
                        
                        shiftDisplay = displayArr.length > 0 ? displayArr.join(', ') : '-';
                        shiftsByDay[day] = { display: shiftDisplay, isAbsent: isAbsent, uiElements: uiElements };
                    }
                });

                const otShifts = empTotalCredit - localWorkDays;
                return { empId, fname: employees[empId].fname, lname: employees[empId].lname, dept: employees[empId].dept, level: employees[empId].level, shiftsByDay, empTotalCredit, empTotalLate, otShifts, shiftCounts };
            });

            const allShiftTypesUsed = new Set();
            summaryMatrix.forEach(emp => {
                Object.keys(emp.shiftCounts).forEach(type => allShiftTypesUsed.add(type));
            });
            const sortedShiftTypesUsed = Array.from(allShiftTypesUsed).sort((a, b) => {
                const nonWorkA = ['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(a);
                const nonWorkB = ['Off', 'Vac', 'พักร้อน', 'ลา', 'ป่วย', 'ขาด'].includes(b);
                if (!nonWorkA && nonWorkB) return -1;
                if (nonWorkA && !nonWorkB) return 1;
                return a.localeCompare(b);
            });

            const handleSaveSettings = async () => {
                const res = await sendToGoogleSheet('saveSettings', { 
                    standardWorkDays: localWorkDays,
                    monthYear: matrixMonth
                });
                if(res.status === 'success') {
                    setSettings({...settings, standardWorkDays: { ...settings.standardWorkDays, [matrixMonth]: localWorkDays }});
                    alert(`อัปเดตวันทำการปกติของเดือน ${matrixMonth} เรียบร้อย ระบบเปลี่ยนให้ทุกคนเห็นตรงกันแล้ว`);
                }
            };

            const handleSaveEdit = async () => {
                if(!editModalData.shiftId) return alert('กรุณาเลือกกะ');
                setIsSaving(true);
                const shiftData = SHIFT_TYPES[editModalData.shiftId];
                const res = await sendToGoogleSheet('editRecord', { 
                    id: editModalData.id, timeIn: editModalData.timeIn || '', timeOut: editModalData.timeOut || '',
                    shiftId: editModalData.shiftId, credit: shiftData ? shiftData.credit : 0
                });
                if (res.status === 'success') {
                    setRecords(records.map(r => r.id === editModalData.id ? { 
                        ...r, timeIn: editModalData.timeIn, timeOut: editModalData.timeOut,
                        shiftId: editModalData.shiftId, credit: shiftData ? shiftData.credit : 0
                    } : r));
                    setEditModalData(null);
                }
                setIsSaving(false);
            };

            const handleSaveAdd = async () => {
                if(!addModalData.empId || !addModalData.date || !addModalData.shiftId || !addModalData.timeIn) return alert('กรุณากรอกข้อมูลสำคัญให้ครบ (รหัส, วันที่, กะ, เวลาเข้า)');
                const upperEmp = addModalData.empId.trim().toUpperCase();
                if(!employees[upperEmp]) return alert('ไม่พบรหัสพนักงานนี้ในระบบ');

                setIsSaving(true);
                const shiftData = SHIFT_TYPES[addModalData.shiftId];
                const newRecord = {
                    id: Date.now().toString(), date: addModalData.date, empId: upperEmp,
                    shiftId: addModalData.shiftId, timeIn: addModalData.timeIn, timeOut: addModalData.timeOut || '',
                    isLate: false, lateMinutes: 0, credit: shiftData ? shiftData.credit : 0, lat: null, lon: null, photoBase64: null
                };

                const res = await sendToGoogleSheet('adminAddRecord', newRecord);
                if(res.status === 'success') { setRecords([...records, newRecord]); setAddModalData(null); }
                setIsSaving(false);
            };

            const handleDelete = async (id) => {
                if (confirm('ยืนยันการลบข้อมูลการลงเวลานี้?')) {
                    const res = await sendToGoogleSheet('deleteRecord', { id });
                    if (res.status === 'success') setRecords(records.filter(r => r.id !== id));
                }
            };

            // 🌟 ฟังก์ชันหลัก: คำนวณและประมวลผลการจัดเวรอัตโนมัติ (ปรับปรุงใหม่ให้กระจายเวรได้)
            const handleRunAutoSchedule = async () => {
                if (!autoScheduleData.shiftId) return alert('กรุณาเลือกกะที่จะเติม');
                if (autoScheduleData.assignMode === 'quota' && autoScheduleData.requiredCount < 1) return alert('จำนวนคนต่อวันต้องมากกว่า 0');
                
                setIsSaving(true);
                const targetEmps = autoScheduleData.empId === 'all' ? matrixEmployees : [autoScheduleData.empId];
                const isQuotaMode = autoScheduleData.assignMode === 'quota';
                const reqCount = autoScheduleData.requiredCount || 1;
                
                const updates = [];
                const newSchedules = { ...schedules };
                
                // สำหรับโหมด Quota: ติดตามจำนวนเวรที่แต่ละคนได้รับเพื่อความยุติธรรม
                const assignedCounts = {};
                if (isQuotaMode) {
                    targetEmps.forEach(empId => {
                        assignedCounts[empId] = 0;
                        daysArray.forEach(day => {
                            const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                            const currentSched = newSchedules[dateStr]?.[empId]?.shifts || [];
                            if (currentSched.includes(autoScheduleData.shiftId)) assignedCounts[empId]++;
                        });
                    });
                }
                
                daysArray.forEach(day => {
                    const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dateObj = new Date(matrixYear, matrixMonthNum - 1, day);
                    const dayOfWeek = dateObj.getDay(); 
                    
                    let isMatchPattern = false;
                    if (autoScheduleData.dayPattern === 'all') isMatchPattern = true;
                    else if (autoScheduleData.dayPattern === 'weekdays' && dayOfWeek >= 1 && dayOfWeek <= 5) isMatchPattern = true;
                    else if (autoScheduleData.dayPattern === 'weekends' && (dayOfWeek === 0 || dayOfWeek === 6)) isMatchPattern = true;
                    
                    if (isMatchPattern) {
                        // คัดกรองคนที่เข้าเงื่อนไขในวันนี้
                        let eligibleEmps = targetEmps.filter(empId => {
                            const currentSched = newSchedules[dateStr]?.[empId]?.shifts || [];
                            const isEmpty = currentSched.length === 0 || (currentSched.length === 1 && currentSched[0] === '');
                            
                            // 🛑 กฎเหล็ก: โหมด Quota ห้ามจ่ายกะเดิมซ้ำในวันเดียวกันให้คนเดิม
                            if (isQuotaMode && currentSched.includes(autoScheduleData.shiftId)) return false;
                            
                            return isEmpty || autoScheduleData.overwrite;
                        });

                        let selectedEmpsForDay = eligibleEmps;

                        if (isQuotaMode) {
                            // จัดเรียงคนที่มีเวรนี้น้อยที่สุดขึ้นมาก่อน (ถ้าเท่ากันให้สุ่ม) เพื่อให้ได้เวรเท่าๆ กันทุกคน
                            eligibleEmps.sort((a, b) => {
                                if (assignedCounts[a] === assignedCounts[b]) return Math.random() - 0.5;
                                return assignedCounts[a] - assignedCounts[b];
                            });
                            
                            // หยิบมาตามจำนวนโควต้าที่กำหนด
                            selectedEmpsForDay = eligibleEmps.slice(0, reqCount);
                        }

                        // จ่ายเวรให้คนที่ได้รับคัดเลือก
                        selectedEmpsForDay.forEach(empId => {
                            if (!newSchedules[dateStr]) newSchedules[dateStr] = {};
                            newSchedules[dateStr][empId] = {
                                shifts: [autoScheduleData.shiftId],
                                isEdited: true,
                                editedBy: user.id
                            };
                            
                            updates.push({
                                date: dateStr,
                                empId: empId,
                                shifts: [autoScheduleData.shiftId]
                            });

                            if (isQuotaMode) assignedCounts[empId]++;
                        });
                    }
                });
                
                if (updates.length === 0) {
                    alert('ไม่มีช่องว่างให้เติม หรือจำนวนพนักงานไม่เพียงพอตามเงื่อนไขครับ');
                    setIsSaving(false);
                    return;
                }
                
                // อัปเดตหน้าจอทันที
                setSchedules(newSchedules);
                setAutoScheduleModal(false);
                
                // ส่งข้อมูลเข้าเซิร์ฟเวอร์แบบกลุ่ม (Bulk)
                const res = await sendToGoogleSheet('saveScheduleBulk', {
                    updates: updates,
                    editorId: user.id,
                    editorName: `${user.fname} ${user.lname}`
                });
                
                if (res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'จัดเวรอัตโนมัติเรียบร้อย', text: `บันทึกข้อมูลสำเร็จ ${updates.length} ช่อง`, showConfirmButton: false, timer: 1500 });
                } else {
                    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: res.message });
                }
                
                setIsSaving(false);
            };

            const exportLogsToCSV = () => {
                if(filteredRecords.length === 0) return alert("ไม่มีข้อมูลสำหรับส่งออก");
                let csvContent = "\uFEFF";
                csvContent += `"ประวัติลงเวลาทั้งหมด","แผนก: ${filterDept || 'ทั้งหมด'}","ตั้งแต่วันที่: ${startDate || '-'}","ถึงวันที่: ${endDate || '-'}"\n\n`;
                csvContent += "วันที่,รหัสพนักงาน,ชื่อ-สกุล,แผนก,กะ,เวลาเข้า,เวลาออก,สถานะ,สาย (นาที),จำนวนเวร\n";
                filteredRecords.forEach(r => {
                    const emp = employees[r.empId] || {};
                    const shift = SHIFT_TYPES[r.shiftId]?.label || '';
                    const lateStatus = r.isLate ? 'สาย' : 'ปกติ';
                    const lateMins = r.isLate ? r.lateMinutes : '0';
                    csvContent += `"${formatDisplayDate(r.date)}","${r.empId}","${emp.fname} ${emp.lname}","${emp.dept}","${shift}","${r.timeIn}","${r.timeOut || '-'}","${lateStatus}","${lateMins}","${r.credit}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `ประวัติลงเวลา_${new Date().getTime()}.csv`;
                link.click();
            };

            const exportSummaryToCSV = () => {
                if(summaryMatrix.length === 0) return alert("ไม่มีข้อมูลสรุปสำหรับส่งออก");
                let csvContent = "\uFEFF"; 
                csvContent += `"สรุปภาพรวมแผนก: ${filterDept || 'ทุกแผนก'}","ประจำเดือน: ${matrixMonth}"\n\n`;
                const headers = ['รหัสพนักงาน', 'ชื่อ-สกุล', 'แผนก', ...daysArray];
                sortedShiftTypesUsed.forEach(type => headers.push(type));
                headers.push('รวมเวรทั้งหมด', 'วันทำการ', 'เวร OT');
                if (role === 'admin') headers.push('รวมสาย (นาที)');
                csvContent += headers.join(',') + '\n';
                
                let grandTotalCredit = 0;
                let grandTotalOT = 0;
                
                summaryMatrix.forEach(row => {
                    grandTotalCredit += row.empTotalCredit;
                    grandTotalOT += row.otShifts;
                    const rowData = [row.empId, `${row.fname} ${row.lname}`, row.dept];
                    daysArray.forEach(day => rowData.push(row.shiftsByDay[day].display));
                    sortedShiftTypesUsed.forEach(type => rowData.push(row.shiftCounts[type] || 0));
                    rowData.push(row.empTotalCredit, localWorkDays, row.otShifts);
                    if (role === 'admin') rowData.push(row.empTotalLate);
                    csvContent += `"${rowData.join('","')}"\n`;
                });
                
                const emptyColsCount = 3 + daysArray.length + sortedShiftTypesUsed.length - 1;
                const emptyCols = Array(emptyColsCount).fill('""').join(',');
                csvContent += `\n"รวมยอดทั้งแผนก",${emptyCols},"${grandTotalCredit}","", "${grandTotalOT}"\n`;

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `สรุปภาพรวมแผนก_${matrixMonth}.csv`;
                link.click();
            };
            
            const exportScheduleToCSV = () => {
                if(matrixEmployees.length === 0) return alert("ไม่มีข้อมูลพนักงานสำหรับส่งออก");
                let csvContent = "\uFEFF";
                csvContent += `"ตารางเวรแผนก: ${filterDept || 'ทุกแผนก'}","ประจำเดือน: ${matrixMonth}"\n\n`;
                csvContent += "รหัสพนักงาน,ชื่อ-สกุล,แผนก," + daysArray.join(',') + "\n";
                matrixEmployees.forEach(empId => {
                    const emp = employees[empId];
                    const rowData = [empId, `${emp.fname} ${emp.lname}`, emp.dept];
                    daysArray.forEach(day => {
                        const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const schedObj = schedules[dateStr]?.[empId];
                        const shifts = schedObj?.shifts || (Array.isArray(schedObj) ? schedObj : []);

                            ) : <div className="text-center py-12 text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50 print-hide"><i className="fa-solid fa-calendar-day text-4xl mb-3 text-slate-300"></i><p className="text-base font-bold text-slate-500">กรุณาเลือก <strong className="text-slate-700">แผนก</strong> จากแถบด้านบน</p></div>}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
