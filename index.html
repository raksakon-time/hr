<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลา รพ.รักษ์สกล</title>
    
    <!-- นำเข้า Google Fonts: Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    boxShadow: {
                        'minimal': '0 4px 20px -2px rgba(0,0,0,0.05)',
                        'floating': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    },
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
    
    <!-- นำเข้า FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px white inset !important; }
        select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ การตั้งค่าระบบหลัก
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwN_t3I53y5PoZY0lGVENHiTvR7Ne_K_OxvTjxfCaAUqyLt3lPPLLBY4gQ8XC2V8ddK/exec";  
        const HOSPITAL_LAT = 17.162383247325145;
        const HOSPITAL_LON = 104.14513206230059;
        const ALLOWED_RADIUS = 100; // ระยะที่ยอมรับได้ (เมตร)

        const sendToGoogleSheet = async (action, payload = {}) => {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                const data = await response.json();
                if (data.status === 'error') alert("แจ้งเตือน: " + data.message);
                return data;
            } catch (error) {
                console.error("Error:", error);
                alert("การเชื่อมต่อล้มเหลว: " + error.message);
                return { status: 'error', message: error.message };
            }
        };

        const captureImage = (videoElement) => {
            if (!videoElement) return null;
            const canvas = document.createElement('canvas');
            const scale = 0.5; 
            canvas.width = videoElement.videoWidth * scale;
            canvas.height = videoElement.videoHeight * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
            return dataUrl.split(',')[1];
        };

        const formatDisplayDate = (dateStr) => {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            const thaiYear = parseInt(year, 10) + 543;
            return `${day}/${month}/${thaiYear}`;
        };

        const formatTime24 = (dateObj) => {
            if (!dateObj) return '';
            const h = String(dateObj.getHours()).padStart(2, '0');
            const m = String(dateObj.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
        };

        const displaySafeTime = (timeStr) => {
            if (!timeStr) return '-';
            if (timeStr.includes('T')) return timeStr.split('T')[1].substring(0, 5) + ' น.';
            return timeStr + ' น.';
        };

        const DEPARTMENTS = [
            "HR-IT", "บัญชี", "การเงินผู้ป่วย-สิทธิประโยชน์", "OPD", "IPD", "ห้องยา",
            "ห้องปฏิบัติการทางการแพทย์", "เอกซเรย์", "OR-LR", "แม่บ้าน", "ซักฟอก",
            "หน่วยจ่ายกลาง", "โภชนาการ", "เปล-ยานยนต์", "ช่าง", "เวชระเบียน", "ส่งเสริมสุขภาพ",
            "ADMIN"
        ];

        // 🌟 กะการทำงานที่อัปเดตแล้ว (เพิ่ม ชบ7)
        const SHIFT_TYPES = {
            'ด': { start: '00:00', end: '08:00', credit: 1, label: '00.00 - 08.00 (ด)' },
            'ช616': { start: '06:00', end: '16:00', credit: 1.25, label: '06.00 - 16.00 (ช616)' },
            'ช618': { start: '06:00', end: '18:00', credit: 1.5, label: '06.00 - 18.00 (ช618)' },
            'ช619': { start: '06:00', end: '19:00', credit: 1.625, label: '06.00 - 19.00 (ช619)' },
            'ช6': { start: '06:00', end: '14:00', credit: 1, label: '06.00 - 14.00 (ช6)' },
            'ช719': { start: '07:00', end: '19:00', credit: 1.5, label: '07.00 - 19.00 (ช719)' },
            'ช7': { start: '07:00', end: '15:00', credit: 1, label: '07.00 - 15.00 (ช7)' },
            'ช21': { start: '07:00', end: '21:00', credit: 1.75, label: '07.00 - 21.00 (ช21)' },
            'ชบ7': { start: '07:00', end: '23:00', credit: 2, label: '07.00 - 23.00 (ชบ7)' },
            'ช': { start: '08:00', end: '16:00', credit: 1, label: '08.00 - 16.00 (ช)' },
            'ชบ': { start: '08:00', end: '24:00', credit: 2, label: '08.00 - 24.00 (ชบ)' },
            'ช20': { start: '08:00', end: '20:00', credit: 1.5, label: '08.00 - 20.00 (ช20)' },
            'ช83': { start: '08:30', end: '16:30', credit: 1, label: '08.30 - 16.30 (ช83)' },
            'ช9': { start: '09:00', end: '21:00', credit: 1.5, label: '09.00 - 21.00 (ช9)' },
            'ช917': { start: '09:00', end: '17:00', credit: 1, label: '09.00 - 17.00 (ช917)' },
            'บ15': { start: '15:00', end: '23:00', credit: 1, label: '15.00 - 23.00 (บ15)' },
            'บ': { start: '16:00', end: '24:00', credit: 1, label: '16.00 - 24.00 (บ)' },
            'บด': { start: '16:00', end: '08:00', credit: 2, label: '16.00 - 08.00 (บด)' },
            'บ4': { start: '17:00', end: '21:00', credit: 0.5, label: '17.00 - 21.00 (บ4)' },
        };

        const getSortedShiftKeys = () => {
            return Object.keys(SHIFT_TYPES).sort((a, b) => {
                const startCmp = SHIFT_TYPES[a].start.localeCompare(SHIFT_TYPES[b].start);
                if (startCmp !== 0) return startCmp;
                return SHIFT_TYPES[a].label.localeCompare(SHIFT_TYPES[b].label);
            });
        };

        // ==========================================
        // View: Register
        // ==========================================
        function RegisterView({ employees, setEmployees, setActiveTab, sendToGoogleSheet }) {
            const [formData, setFormData] = useState({ empId: '', fname: '', lname: '', dept: 'OPD', level: 'พนักงาน' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.empId.trim() || !formData.fname.trim() || !formData.lname.trim()) {
                    return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                }
                const upperEmpId = formData.empId.trim().toUpperCase();
                if (employees[upperEmpId]) {
                    return alert("รหัสพนักงานนี้มีอยู่ในระบบแล้ว");
                }

                setIsSubmitting(true);
                const res = await sendToGoogleSheet('register', { ...formData, empId: upperEmpId });
                if (res.status === 'success') {
                    alert("ลงทะเบียนสำเร็จ");
                    setEmployees({ ...employees, [upperEmpId]: { ...formData } });
                    setActiveTab('in'); 
                }
                setIsSubmitting(false);
            };

            return (
                <div className="max-w-md mx-auto bg-white rounded-2xl shadow-minimal border border-violet-100 p-8 mt-6">
                    <div className="text-center mb-6">
                        <div className="w-16 h-16 bg-violet-50 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-solid fa-user-plus text-2xl text-violet-500"></i></div>
                        <h2 className="text-xl font-semibold text-gray-900">ลงทะเบียนพนักงานใหม่</h2>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1">รหัสพนักงาน (ID)</label>
                            <input type="text" required value={formData.empId} onChange={e => setFormData({...formData, empId: e.target.value.toUpperCase()})} className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-violet-400" placeholder="เช่น EMP01" />
                        </div>
                        <div className="flex gap-3">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-500 mb-1">ชื่อ</label>
                                <input type="text" required value={formData.fname} onChange={e => setFormData({...formData, fname: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-violet-400" />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-500 mb-1">นามสกุล</label>
                                <input type="text" required value={formData.lname} onChange={e => setFormData({...formData, lname: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-violet-400" />
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-500 mb-1">แผนก</label>
                                <select value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-violet-400">
                                    {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                                </select>
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-500 mb-1">ระดับ</label>
                                <select value={formData.level} onChange={e => setFormData({...formData, level: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 outline-none focus:border-violet-400">
                                    <option value="พนักงาน">พนักงาน</option>
                                    <option value="หัวหน้า">หัวหน้า</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" disabled={isSubmitting} className="w-full p-3.5 bg-violet-600 hover:bg-violet-700 text-white rounded-xl font-medium transition-colors mt-4">
                            {isSubmitting ? 'กำลังบันทึก...' : 'ลงทะเบียน'}
                        </button>
                    </form>
                </div>
            );
        }

        // ==========================================
        // App Main
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('in');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [records, setRecords] = useState([]);
            const [employees, setEmployees] = useState({});
            const [schedules, setSchedules] = useState({});
            const [isLoading, setIsLoading] = useState(true);
            const [settings, setSettings] = useState({ standardWorkDays: 22 });
            
            const [loggedInAdmin, setLoggedInAdmin] = useState(null);
            const [loggedInSupervisor, setLoggedInSupervisor] = useState(null);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const fetchInitialData = async () => {
                    if (GAS_URL.includes("ใส่_URL_ลงท้ายด้วย_EXEC_ของท่านที่นี่")) {
                        setIsLoading(false); return;
                    }
                    const res = await sendToGoogleSheet('getInitialData');
                    if (res.status === 'success') {
                        setEmployees(res.data.employees || {});
                        setRecords(res.data.records || []);
                        setSchedules(res.data.schedules || {});
                        if (res.data.settings) setSettings(res.data.settings); 
                    }
                    setIsLoading(false);
                };
                fetchInitialData();
            }, []);

            const formatDateForInput = (date) => {
                const d = new Date(date);
                const month = '' + (d.getMonth() + 1);
                const day = '' + d.getDate();
                const year = d.getFullYear();
                return [year, month.padStart(2, '0'), day.padStart(2, '0')].join('-');
            };

            const getNavClass = (tabName) => {
                const isActive = activeTab === tabName;
                let activeStyle = 'bg-gray-900 text-white shadow-sm';
                if (isActive) {
                    if (tabName === 'in') activeStyle = 'bg-emerald-600 text-white shadow-sm';
                    else if (tabName === 'out') activeStyle = 'bg-rose-500 text-white shadow-sm';
                    else if (tabName === 'dailyReport') activeStyle = 'bg-blue-600 text-white shadow-sm';
                    else if (tabName === 'register') activeStyle = 'bg-violet-600 text-white shadow-sm';
                    else if (tabName === 'supervisor') activeStyle = 'bg-amber-600 text-white shadow-sm';
                    else if (tabName === 'report') activeStyle = 'bg-slate-800 text-white shadow-sm';
                }
                return `px-3.5 py-2 text-[13px] sm:text-sm rounded-full flex items-center gap-1.5 transition-all font-medium whitespace-nowrap ${isActive ? activeStyle : 'text-gray-500 hover:text-gray-900 hover:bg-gray-100'}`;
            };

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
                    <i className="fa-solid fa-spinner fa-spin text-4xl text-gray-400 mb-4"></i>
                    <h2 className="text-lg font-medium text-gray-600">กำลังดึงข้อมูลระบบ...</h2>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b border-gray-100 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6">
                            <div className="flex justify-between items-center h-16 overflow-x-auto no-scrollbar">
                                <div className="font-bold text-lg tracking-tight flex items-center gap-2 whitespace-nowrap mr-6 text-gray-900">
                                    <div className="bg-gray-900 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-hospital-user text-white text-sm"></i></div>รักษ์สกล
                                </div>
                                <div className="flex space-x-1">
                                    <button onClick={() => setActiveTab('in')} className={getNavClass('in')}><i className="fa-solid fa-arrow-right-to-bracket"></i> <span className="hidden sm:inline">เข้างาน</span></button>
                                    <button onClick={() => setActiveTab('out')} className={getNavClass('out')}><i className="fa-solid fa-arrow-right-from-bracket"></i> <span className="hidden sm:inline">ออกงาน</span></button>
                                    <button onClick={() => setActiveTab('dailyReport')} className={getNavClass('dailyReport')}><i className="fa-regular fa-calendar-check"></i> <span className="hidden sm:inline">ประวัติ</span></button>
                                    <button onClick={() => setActiveTab('register')} className={getNavClass('register')}><i className="fa-solid fa-user-plus"></i> <span className="hidden sm:inline">ลงทะเบียน</span></button>
                                    <div className="w-px h-6 bg-gray-200 mx-1 self-center"></div>
                                    <button onClick={() => setActiveTab('supervisor')} className={getNavClass('supervisor')}><i className="fa-solid fa-user-tie"></i> <span>หัวหน้า</span></button>
                                    <button onClick={() => setActiveTab('report')} className={getNavClass('report')}><i className="fa-solid fa-shield-halved"></i> <span className="hidden sm:inline">แอดมิน</span></button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    <main className="flex-grow max-w-[1240px] w-full mx-auto p-4 sm:p-6 lg:p-8">
                        {activeTab === 'register' && <RegisterView employees={employees} setEmployees={setEmployees} setActiveTab={setActiveTab} sendToGoogleSheet={sendToGoogleSheet} />}
                        {activeTab === 'in' && <ClockInView currentTime={currentTime} records={records} setRecords={setRecords} formatDateForInput={formatDateForInput} employees={employees} schedules={schedules} sendToGoogleSheet={sendToGoogleSheet} />}
                        {activeTab === 'out' && <ClockOutView currentTime={currentTime} records={records} setRecords={setRecords} formatDateForInput={formatDateForInput} employees={employees} sendToGoogleSheet={sendToGoogleSheet} />}
                        {activeTab === 'dailyReport' && <DailyReportView records={records} employees={employees} formatDateForInput={formatDateForInput} currentTime={currentTime} />}
                        
                        {activeTab === 'supervisor' && (
                            loggedInSupervisor ? 
                            <ReportView role="supervisor" user={loggedInSupervisor} onLogout={() => setLoggedInSupervisor(null)} records={records} setRecords={setRecords} employees={employees} schedules={schedules} setSchedules={setSchedules} sendToGoogleSheet={sendToGoogleSheet} settings={settings} /> : 
                            <SupervisorLoginView employees={employees} onLogin={(user) => setLoggedInSupervisor(user)} onCancel={() => setActiveTab('in')} />
                        )}

                        {activeTab === 'report' && (
                            loggedInAdmin ? 
                            <ReportView role="admin" user={loggedInAdmin} onLogout={() => setLoggedInAdmin(null)} records={records} setRecords={setRecords} employees={employees} schedules={schedules} setSchedules={setSchedules} sendToGoogleSheet={sendToGoogleSheet} settings={settings} setSettings={setSettings} /> : 
                            <AdminLoginView employees={employees} onLogin={(user) => setLoggedInAdmin(user)} onCancel={() => setActiveTab('in')} />
                        )}
                    </main>
                </div>
            );
        }

        function AdminLoginView({ employees, onLogin, onCancel }) {
            const [adminId, setAdminId] = useState('');
            const [errorMsg, setErrorMsg] = useState('');

            const handleLogin = () => {
                const id = adminId.trim().toUpperCase();
                if (!id) { setErrorMsg('กรุณากรอกรหัสประจำตัว'); return; }
                const emp = employees[id];
                if (emp && emp.dept === 'ADMIN') onLogin({ id, ...emp });
                else setErrorMsg('รหัสนี้ไม่มีสิทธิ์เข้าถึง (สงวนสิทธิ์เฉพาะแผนก ADMIN)');
            };

            return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl p-8 shadow-minimal border border-gray-100 mt-10 text-center">
                    <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-lock text-2xl text-slate-500"></i></div>
                    <h2 className="text-xl font-semibold text-gray-900">ผู้ดูแลระบบ (Admin)</h2>
                    <p className="text-sm text-gray-500 mt-1 mb-6">เข้าสู่ระบบเพื่อจัดการข้อมูล</p>
                    {errorMsg && <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-medium border border-red-100">{errorMsg}</div>}
                    <input type="text" placeholder="รหัสพนักงาน ADMIN" value={adminId} onChange={e => setAdminId(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} className="w-full p-3.5 mb-4 border border-gray-200 rounded-xl bg-gray-50 outline-none text-center tracking-wide font-medium focus:bg-white focus:border-slate-400 transition-colors" />
                    <button onClick={handleLogin} className="w-full p-3.5 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-medium transition-colors mb-2">เข้าสู่ระบบ</button>
                    <button onClick={onCancel} className="w-full p-3 text-sm text-gray-500 hover:text-gray-800 transition-colors">ยกเลิก</button>
                </div>
            );
        }

        function SupervisorLoginView({ employees, onLogin, onCancel }) {
            const [superId, setSuperId] = useState('');
            const [errorMsg, setErrorMsg] = useState('');

            const handleLogin = () => {
                const id = superId.trim().toUpperCase();
                if (!id) { setErrorMsg('กรุณากรอกรหัสประจำตัว'); return; }
                const emp = employees[id];
                if (emp && emp.level === 'หัวหน้า') onLogin({ id, ...emp });
                else setErrorMsg('รหัสนี้ไม่มีสิทธิ์เข้าถึง (สงวนสิทธิ์เฉพาะผู้ใช้งานระดับ "หัวหน้า")');
            };

            return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl p-8 shadow-minimal border border-amber-100 mt-10 text-center">
                    <div className="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-user-shield text-2xl text-amber-600"></i></div>
                    <h2 className="text-xl font-semibold text-gray-900">พื้นที่หัวหน้างาน (Supervisor)</h2>
                    <p className="text-sm text-gray-500 mt-1 mb-6">เข้าสู่ระบบเพื่อจัดการตารางเวรและดูสรุปภาพรวมแผนก</p>
                    {errorMsg && <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-medium border border-red-100">{errorMsg}</div>}
                    <input type="text" placeholder="รหัสพนักงานของหัวหน้า" value={superId} onChange={e => setSuperId(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} className="w-full p-3.5 mb-4 border border-gray-200 rounded-xl bg-gray-50 outline-none text-center tracking-wide font-medium focus:bg-white focus:border-amber-400 transition-colors" />
                    <button onClick={handleLogin} className="w-full p-3.5 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-medium transition-colors mb-2">เข้าสู่ระบบ</button>
                    <button onClick={onCancel} className="w-full p-3 text-sm text-gray-500 hover:text-gray-800 transition-colors">ยกเลิก</button>
                </div>
            );
        }

        function ClockInView({ currentTime, records, setRecords, formatDateForInput, employees, schedules, sendToGoogleSheet }) {
            const [empId, setEmpId] = useState('');
            const [loggedInEmp, setLoggedInEmp] = useState(null);
            const [selectedShift, setSelectedShift] = useState('ช');
            const [locationStatus, setLocationStatus] = useState('checking'); 
            const [currentLocation, setCurrentLocation] = useState(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [result, setResult] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const videoRef = useRef(null);

            useEffect(() => {
                if (cameraActive && loggedInEmp && !result) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                        .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                        .catch(() => { setErrorMsg("ไม่สามารถเปิดกล้องได้ โปรดตรวจสอบการอนุญาต"); setCameraActive(false); });
                } else {
                    if (videoRef.current && videoRef.current.srcObject) videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
            }, [cameraActive, loggedInEmp, result]);

            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371; 
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c * 1000; 
            };

            const checkLocation = () => {
                setLocationStatus('checking');
                if (!navigator.geolocation) { setErrorMsg("เบราว์เซอร์ไม่รองรับ GPS"); setLocationStatus('error'); return; }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude; const lon = position.coords.longitude;
                        setCurrentLocation({ lat, lon });
                        const dist = getDistance(lat, lon, HOSPITAL_LAT, HOSPITAL_LON);
                        if (dist <= ALLOWED_RADIUS) setLocationStatus('ok');
                        else { setErrorMsg(`อยู่นอกพื้นที่ รพ. (${Math.round(dist)}ม.)`); setLocationStatus('error'); }
                    },
                    (err) => { setErrorMsg("โปรดอนุญาตให้เข้าถึงตำแหน่ง (GPS)"); setLocationStatus('error'); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const handleLogin = () => {
                if (!empId.trim()) { setErrorMsg("กรุณากรอกรหัสพนักงาน"); return; }
                const upperEmpId = empId.trim().toUpperCase();
                if (!employees[upperEmpId]) { setErrorMsg(`ไม่พบรหัสพนักงาน ${upperEmpId}`); return; }
                
                const today = formatDateForInput(currentTime);
                const activeRecord = records.find(r => r.empId === upperEmpId && r.date === today && !r.timeOut);
                if (activeRecord) { setErrorMsg(`ค้างลงเวลาออกกะ "${SHIFT_TYPES[activeRecord.shiftId].label}"`); return; }

                const scheduledShifts = schedules[today]?.[upperEmpId] || [];
                const validScheduledShifts = scheduledShifts.filter(s => s && !['Off', 'Vac', 'พักร้อน', 'ลา', 'ขาด'].includes(s));
                if(validScheduledShifts.length > 0) setSelectedShift(validScheduledShifts[0]);

                setErrorMsg('');
                setLoggedInEmp({ id: upperEmpId, ...employees[upperEmpId] });
                checkLocation(); 
            };

            const handleClockIn = async () => {
                setErrorMsg(''); setIsScanning(true);
                const photoBase64 = captureImage(videoRef.current);
                const shiftData = SHIFT_TYPES[selectedShift];
                const [shiftHour, shiftMinute] = shiftData.start.split(':').map(Number);
                const actualMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                const deadlineMins = (shiftHour * 60) + shiftMinute + 5; 
                
                const isLate = actualMins > deadlineMins && actualMins < deadlineMins + 720; 
                const lateMinutes = isLate ? (actualMins - deadlineMins) : 0;
                const timeInStr = formatTime24(currentTime);

                const newRecord = {
                    id: Date.now().toString(), date: formatDateForInput(currentTime),
                    empId: loggedInEmp.id, shiftId: selectedShift, timeIn: timeInStr,
                    timeOut: null, isLate: isLate, lateMinutes: lateMinutes, credit: shiftData.credit,
                    lat: currentLocation?.lat, lon: currentLocation?.lon, photoBase64: photoBase64
                };

                const today = formatDateForInput(currentTime);
                const scheduledShifts = schedules[today]?.[loggedInEmp.id] || [];
                const validScheduledShifts = scheduledShifts.filter(s => s);
                const isWrongShift = validScheduledShifts.length > 0 && !validScheduledShifts.includes(selectedShift);

                const res = await sendToGoogleSheet('clockIn', newRecord);
                if (res.status === 'success') {
                    setRecords([...records, newRecord]);
                    setResult({ ...newRecord, shiftName: shiftData.label, isWrongShift, validScheduledShifts });
                } else setErrorMsg("บันทึกไม่สำเร็จ: " + res.message);
                setIsScanning(false); setCameraActive(false);
            };

            if (result) return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl p-8 shadow-minimal border border-gray-100 text-center mt-6">
                    <div className="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-check text-2xl text-emerald-500"></i></div>
                    <h2 className="text-xl font-semibold text-gray-900">เข้างานสำเร็จ</h2>
                    <div className="my-6 p-4 bg-emerald-50/30 rounded-xl border border-emerald-100">
                        <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">เวลาเข้างาน</p>
                        <p className="text-4xl font-bold text-emerald-700 tracking-tight mb-3">{displaySafeTime(result.timeIn)}</p>
                        <div className="inline-flex items-center gap-2 text-sm font-medium text-emerald-700 bg-white px-3 py-1.5 rounded-lg border border-emerald-200">
                            <i className="fa-solid fa-calendar-day"></i> กะ: {result.shiftName}
                        </div>
                    </div>
                    {result.isWrongShift && (
                        <div className="mb-4 text-left bg-orange-50 border border-orange-200 text-orange-800 p-3 rounded-xl text-sm flex gap-3">
                            <i className="fa-solid fa-triangle-exclamation mt-0.5 text-orange-500"></i>
                            <div>
                                <p className="font-bold">แจ้งเตือน: ลงกะไม่ตรงตาราง!</p>
                                <p className="text-xs mt-0.5">กะที่ถูกจัดไว้: {result.validScheduledShifts.map(s => SHIFT_TYPES[s]?.label || s).join(', ')}</p>
                            </div>
                        </div>
                    )}
                    {result.isLate && (
                        <div className="mb-6 inline-flex items-center gap-2 bg-red-50 text-red-600 px-4 py-2 rounded-full text-sm font-medium">
                            <i className="fa-regular fa-clock"></i> สาย {result.lateMinutes} นาที
                        </div>
                    )}
                    <button onClick={() => {setResult(null); setLoggedInEmp(null); setEmpId(''); setCurrentLocation(null);}} className="w-full p-3.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">เสร็จสิ้น</button>
                </div>
            );

            return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl shadow-minimal border border-emerald-100 overflow-hidden mt-6 relative">
                    <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>
                    <div className="px-6 pt-8 pb-6 text-center border-b border-gray-50">
                        <h2 className="text-lg font-medium text-emerald-600 mb-1">ลงเวลาเข้างาน</h2>
                        <div className="text-5xl font-bold text-gray-900 tracking-tight font-mono">{formatTime24(currentTime)} <span className="text-xl">น.</span></div>
                    </div>
                    <div className="p-6 space-y-6">
                        {errorMsg && <div className="p-3 bg-red-50 text-red-600 rounded-xl text-sm font-medium flex items-center gap-2"><i className="fa-solid fa-circle-exclamation"></i> {errorMsg}</div>}
                        {!loggedInEmp ? (
                            <>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">รหัสพนักงาน</label>
                                    <input type="text" value={empId} onChange={(e) => setEmpId(e.target.value.toUpperCase())} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} className="w-full p-3.5 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium focus:bg-white focus:border-emerald-400 transition-colors placeholder:font-normal" placeholder="กรอกรหัสพนักงาน" />
                                </div>
                                <button onClick={handleLogin} className="w-full p-3.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-medium transition-colors shadow-sm">ตรวจสอบข้อมูล</button>
                            </>
                        ) : (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="flex items-center gap-4 bg-gray-50 border border-gray-100 p-4 rounded-xl">
                                    <div className="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><i className="fa-regular fa-user"></i></div>
                                    <div>
                                        <p className="font-semibold text-gray-900">{loggedInEmp.fname} {loggedInEmp.lname}</p>
                                        <p className="text-xs text-gray-500">{loggedInEmp.id} • {loggedInEmp.dept}</p>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">เลือกกะการทำงาน</label>
                                    <select value={selectedShift} onChange={(e) => setSelectedShift(e.target.value)} className="w-full p-3.5 border border-gray-200 rounded-xl bg-white outline-none font-medium focus:border-emerald-400 transition-colors">
                                        {getSortedShiftKeys().map(key => <option key={key} value={key}>{SHIFT_TYPES[key].label}</option>)}
                                    </select>
                                </div>
                                <div className={`p-3 rounded-xl flex items-center gap-3 text-xs font-medium border ${locationStatus === 'ok' ? 'bg-green-50 border-green-100 text-green-700' : locationStatus === 'error' ? 'bg-red-50 border-red-100 text-red-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                    {locationStatus === 'ok' ? <><i className="fa-solid fa-location-dot"></i> พิกัดถูกต้อง (ใน รพ.)</> : locationStatus === 'error' ? <><i className="fa-solid fa-location-xmark"></i> พิกัดอยู่นอกพื้นที่ <button onClick={checkLocation} className="ml-auto underline font-bold">ลองใหม่</button></> : <><i className="fa-solid fa-spinner fa-spin"></i> ตรวจสอบพิกัด GPS...</>}
                                </div>
                                <div className="border border-dashed border-gray-300 rounded-2xl h-48 flex items-center justify-center bg-gray-50 overflow-hidden relative group">
                                    {cameraActive ? <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1]" /> : 
                                    <button onClick={() => setCameraActive(true)} disabled={locationStatus !== 'ok'} className={`flex flex-col items-center transition-colors ${locationStatus === 'ok' ? 'text-emerald-600 hover:text-emerald-700' : 'text-gray-300'}`}>
                                        <div className="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center mb-2 shadow-sm group-hover:shadow transition-all"><i className="fa-solid fa-camera"></i></div>
                                        <span className="text-xs font-medium">เปิดกล้องสแกนใบหน้า</span>
                                    </button>}
                                </div>
                                <button onClick={handleClockIn} disabled={!cameraActive || isScanning || locationStatus !== 'ok'} className={`w-full p-3.5 rounded-xl font-medium text-white transition-all ${(cameraActive && locationStatus === 'ok') ? 'bg-emerald-600 hover:bg-emerald-700 shadow-sm' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                    {isScanning ? 'กำลังบันทึก...' : 'สแกนใบหน้า ยืนยันเข้างาน'}
                                </button>
                                <button onClick={() => {setLoggedInEmp(null); setCurrentLocation(null);}} className="w-full text-xs text-gray-400 font-medium hover:text-gray-600 text-center uppercase tracking-wider">ย้อนกลับ / เปลี่ยนพนักงาน</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function ClockOutView({ currentTime, records, setRecords, formatDateForInput, employees, sendToGoogleSheet }) {
            const [outEmpId, setOutEmpId] = useState('');
            const [outDate, setOutDate] = useState(formatDateForInput(currentTime));
            const [foundRecord, setFoundRecord] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [showEarlyWarning, setShowEarlyWarning] = useState(false);
            const [successResult, setSuccessResult] = useState(null);
            const videoRef = useRef(null);

            useEffect(() => {
                if (cameraActive) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                        .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                        .catch(() => { setErrorMsg("ไม่สามารถเข้าถึงกล้องได้"); setCameraActive(false); });
                } else if (videoRef.current && videoRef.current.srcObject) videoRef.current.srcObject.getTracks().forEach(track => track.stop());
            }, [cameraActive]);

            const searchRecord = () => {
                setErrorMsg(''); setFoundRecord(null);
                const upperEmpId = outEmpId.trim().toUpperCase();
                if (!upperEmpId) { setErrorMsg("กรุณากรอกรหัสพนักงาน"); return; }
                const record = records.find(r => r.empId === upperEmpId && r.date === outDate && !r.timeOut);
                if (!record) { setErrorMsg(`ไม่พบประวัติค้างลงเวลาออกของวันที่กำหนด`); return; }
                setFoundRecord(record);
            };

            const handleClockOutAttempt = () => {
                if (!cameraActive) { setErrorMsg("กรุณาเปิดกล้อง"); return; }
                const shiftData = SHIFT_TYPES[foundRecord.shiftId];
                let shiftEndStr = shiftData.end === '24:00' ? '23:59' : shiftData.end;
                const [endH, endM] = shiftEndStr.split(':').map(Number);
                const [startH, startM] = shiftData.start.split(':').map(Number);
                
                const endTime = new Date(currentTime); 
                endTime.setHours(endH, endM, 0, 0);
                if (endH < startH) if (currentTime.getHours() >= 12) endTime.setDate(endTime.getDate() + 1);

                if (currentTime < endTime) setShowEarlyWarning(true);
                else processClockOut();
            };

            const processClockOut = async () => {
                setShowEarlyWarning(false); setIsScanning(true); setErrorMsg('');
                const photoBase64 = captureImage(videoRef.current);
                const timeOutStr = formatTime24(currentTime);
                
                const res = await sendToGoogleSheet('clockOut', { id: foundRecord.id, timeOut: timeOutStr, photoBase64: photoBase64 });
                if (res.status === 'success') {
                    setRecords(records.map(r => r.id === foundRecord.id ? { ...r, timeOut: timeOutStr } : r));
                    setSuccessResult({ timeOut: timeOutStr, shiftName: SHIFT_TYPES[foundRecord.shiftId]?.label });
                } else setErrorMsg("เกิดข้อผิดพลาด: " + res.message);
                setIsScanning(false); setCameraActive(false);
            };

            if (successResult) return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl p-8 shadow-minimal border border-gray-100 text-center mt-6">
                    <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-arrow-right-from-bracket text-2xl text-rose-500"></i></div>
                    <h2 className="text-xl font-semibold text-gray-900">ลงเวลาออกงานสำเร็จ</h2>
                    <div className="my-6 p-4 bg-rose-50/30 rounded-xl border border-rose-100">
                        <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">เวลาออกงาน</p>
                        <p className="text-4xl font-bold text-rose-600 tracking-tight mb-3">{displaySafeTime(successResult.timeOut)}</p>
                        <div className="inline-flex items-center gap-2 text-sm font-medium text-rose-700 bg-white px-3 py-1.5 rounded-lg border border-rose-200">
                            <i className="fa-solid fa-calendar-day text-rose-400"></i> กะ: {successResult.shiftName}
                        </div>
                    </div>
                    <button onClick={() => { setSuccessResult(null); setFoundRecord(null); setOutEmpId(''); }} className="w-full p-3.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">เสร็จสิ้น</button>
                </div>
            );

            return (
                <div className="max-w-sm mx-auto bg-white rounded-2xl shadow-minimal border border-rose-100 overflow-hidden mt-6 relative">
                    <div className="absolute top-0 left-0 w-full h-1 bg-rose-500"></div>
                    <div className="px-6 pt-8 pb-6 text-center border-b border-gray-50">
                        <h2 className="text-lg font-medium text-rose-600 mb-1">ลงเวลาออกงาน</h2>
                        <div className="text-5xl font-bold text-gray-900 tracking-tight font-mono">{formatTime24(currentTime)} <span className="text-xl">น.</span></div>
                    </div>
                    <div className="p-6 space-y-6">
                        {errorMsg && <div className="p-3 bg-red-50 text-red-600 rounded-xl text-sm font-medium flex items-center gap-2"><i className="fa-solid fa-circle-exclamation"></i> {errorMsg}</div>}
                        {!foundRecord ? (
                            <>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">รหัสพนักงาน</label>
                                        <input type="text" value={outEmpId} onChange={(e) => setOutEmpId(e.target.value.toUpperCase())} className="w-full p-3.5 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium focus:bg-white focus:border-rose-300 transition-colors" placeholder="เช่น EMP01" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">วันที่เข้างาน</label>
                                        <input type="date" value={outDate} onChange={(e) => setOutDate(e.target.value)} className="w-full p-3.5 border border-gray-200 rounded-xl bg-gray-50 outline-none font-medium focus:bg-white focus:border-rose-300 transition-colors text-sm" />
                                    </div>
                                </div>
                                <button onClick={searchRecord} className="w-full p-3.5 bg-rose-50 text-rose-700 hover:bg-rose-100 rounded-xl font-medium transition-colors">ค้นหาประวัติเข้างาน</button>
                            </>
                        ) : (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-rose-50/50 border border-rose-100 p-4 rounded-xl relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-rose-400"></div>
                                    <p className="font-semibold text-gray-900 ml-1">{foundRecord.empId} • {employees[foundRecord.empId]?.fname}</p>
                                    <p className="text-xs text-gray-500 mt-1 ml-1"><i className="fa-regular fa-clock mr-1"></i> เข้างาน: {displaySafeTime(foundRecord.timeIn)} ({SHIFT_TYPES[foundRecord.shiftId]?.label})</p>
                                    <p className="text-xs text-gray-500 mt-1 ml-1"><i className="fa-regular fa-calendar mr-1"></i> วันที่: {formatDisplayDate(foundRecord.date)}</p>
                                </div>
                                <div className="border border-dashed border-gray-300 rounded-2xl h-48 flex items-center justify-center bg-gray-50 overflow-hidden relative group">
                                    {cameraActive ? <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1]" /> : 
                                    <button onClick={() => setCameraActive(true)} className="flex flex-col items-center text-gray-400 hover:text-rose-500 transition-colors">
                                        <div className="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center mb-2 shadow-sm group-hover:shadow transition-all"><i className="fa-solid fa-camera"></i></div>
                                        <span className="text-xs font-medium">เปิดกล้องสแกนหน้า</span>
                                    </button>}
                                </div>
                                {showEarlyWarning ? (
                                    <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 text-center">
                                        <p className="font-medium text-orange-800 mb-3 text-sm">ออกก่อนเวลาเลิกกะ ยืนยันหรือไม่?</p>
                                        <div className="flex gap-2">
                                            <button onClick={processClockOut} className="flex-1 bg-orange-500 text-white rounded-lg py-2 text-sm font-medium">ยืนยันออก</button>
                                            <button onClick={() => setShowEarlyWarning(false)} className="flex-1 bg-white border border-gray-200 text-gray-600 rounded-lg py-2 text-sm font-medium">ยกเลิก</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={handleClockOutAttempt} disabled={!cameraActive || isScanning} className={`w-full p-3.5 rounded-xl font-medium text-white transition-all ${cameraActive ? 'bg-rose-500 hover:bg-rose-600 shadow-sm' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                        {isScanning ? 'กำลังบันทึก...' : 'สแกนหน้า ยืนยันออกงาน'}
                                    </button>
                                )}
                                <button onClick={() => setFoundRecord(null)} className="w-full text-xs text-gray-400 font-medium hover:text-gray-600 text-center uppercase tracking-wider">ค้นหาใหม่</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function DailyReportView({ records, employees, formatDateForInput, currentTime }) {
            const [filterDate, setFilterDate] = useState(formatDateForInput(currentTime));
            const [filterEmp, setFilterEmp] = useState('');

            const filteredRecords = records.filter(r => {
                const emp = employees[r.empId];
                if (!emp) return false;
                let match = true;
                if (filterDate && r.date !== filterDate) match = false;
                if (filterEmp) {
                    const search = filterEmp.toLowerCase();
                    const name = `${emp.fname} ${emp.lname}`.toLowerCase();
                    if (!r.empId.toLowerCase().includes(search) && !name.includes(search)) match = false;
                }
                return match;
            });

            return (
                <div className="bg-white rounded-2xl shadow-minimal border border-blue-100 p-6 mt-2 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                    <h2 className="text-xl font-semibold text-blue-800 mb-6 mt-2">ประวัติการลงเวลา</h2>
                    <div className="flex flex-col md:flex-row gap-4 mb-6">
                        <div className="flex-1">
                            <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">วันที่</label>
                            <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-300" />
                        </div>
                        <div className="flex-1">
                            <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">ค้นหาพนักงาน</label>
                            <input type="text" placeholder="รหัส หรือ ชื่อ..." value={filterEmp} onChange={e => setFilterEmp(e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-300" />
                        </div>
                    </div>
                    <div className="overflow-x-auto border border-gray-200 rounded-xl">
                        <table className="min-w-full text-sm text-left whitespace-nowrap">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="px-6 py-3 font-medium text-gray-500">พนักงาน</th>
                                    <th className="px-6 py-3 font-medium text-gray-500">แผนก</th>
                                    <th className="px-6 py-3 font-medium text-gray-500">กะ</th>
                                    <th className="px-6 py-3 font-medium text-gray-500 text-center">เข้า</th>
                                    <th className="px-6 py-3 font-medium text-gray-500 text-center">ออก</th>
                                    <th className="px-6 py-3 font-medium text-gray-500 text-center">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {filteredRecords.map(r => {
                                    const emp = employees[r.empId];
                                    return (
                                        <tr key={r.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-3"><span className="font-medium text-gray-900">{emp.fname}</span> <span className="text-gray-400 text-xs ml-1">({r.empId})</span></td>
                                            <td className="px-6 py-3 text-gray-500 text-xs">{emp.dept}</td>
                                            <td className="px-6 py-3 text-gray-600 text-xs">{SHIFT_TYPES[r.shiftId]?.label}</td>
                                            <td className="px-6 py-3 text-center font-medium text-gray-900">{displaySafeTime(r.timeIn)}</td>
                                            <td className="px-6 py-3 text-center font-medium text-gray-900">{displaySafeTime(r.timeOut)}</td>
                                            <td className="px-6 py-3 text-center">
                                                {r.isLate ? <span className="text-red-500 text-xs font-medium bg-red-50 px-2 py-1 rounded-full">สาย {r.lateMinutes} นาที</span> : <span className="text-green-500 text-xs font-medium bg-green-50 px-2 py-1 rounded-full">ปกติ</span>}
                                            </td>
                                        </tr>
                                    );
                                })}
                                {filteredRecords.length === 0 && <tr><td colSpan="6" className="px-6 py-8 text-center text-gray-400">ไม่พบประวัติในวันที่เลือก</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const MapModal = ({ lat, lon, onClose }) => (
            <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                <div className="bg-white p-1 rounded-2xl w-full max-w-lg shadow-floating overflow-hidden">
                    <div className="flex justify-between items-center px-4 py-3 border-b border-gray-50">
                        <h3 className="font-semibold text-gray-900 text-sm">พิกัดลงเวลา</h3>
                        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                    <iframe src={`https://maps.google.com/maps?q=${lat},${lon}&hl=th&z=17&output=embed`} width="100%" height="300" frameBorder="0" className="bg-gray-50" />
                </div>
            </div>
        );

        const PhotoModal = ({ record, employees, onClose }) => {
            const emp = employees[record.empId] || {};
            return (
                <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                    <div className="bg-white p-1 rounded-2xl w-full max-w-md shadow-floating overflow-hidden flex flex-col">
                        <div className="flex justify-between items-center px-4 py-3 border-b border-gray-50 shrink-0">
                            <h3 className="font-semibold text-gray-900 text-sm">รูปสแกนใบหน้า</h3>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="p-4 bg-gray-50 flex gap-4 h-64 overflow-hidden">
                            {record.photoInUrl ? (
                                <div className="flex-1 flex flex-col">
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 text-center">เข้างาน</p>
                                    <iframe src={record.photoInUrl.replace('/view', '/preview')} className="w-full flex-1 border border-gray-200 rounded-xl bg-white" />
                                </div>
                            ) : <div className="flex-1 flex flex-col items-center justify-center border border-dashed border-gray-200 rounded-xl bg-white"><i className="fa-regular fa-image text-gray-300 text-2xl"></i></div>}
                            
                            {record.photoOutUrl ? (
                                <div className="flex-1 flex flex-col">
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 text-center">ออกงาน</p>
                                    <iframe src={record.photoOutUrl.replace('/view', '/preview')} className="w-full flex-1 border border-gray-200 rounded-xl bg-white" />
                                </div>
                            ) : <div className="flex-1 flex flex-col items-center justify-center border border-dashed border-gray-200 rounded-xl bg-white"><i className="fa-regular fa-image text-gray-300 text-2xl"></i></div>}
                        </div>
                        <div className="p-4 border-t border-gray-50 text-sm text-gray-600 shrink-0">
                            <p><span className="font-medium text-gray-900">{emp.fname} {emp.lname}</span> ({record.empId})</p>
                            <p className="text-xs mt-1 text-gray-500">วันที่: {formatDisplayDate(record.date)}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // View: Report (Admin/Supervisor)
        // ==========================================
        function ReportView({ role, user, onLogout, records, setRecords, employees, schedules, setSchedules, sendToGoogleSheet, settings, setSettings }) {
            const [adminTab, setAdminTab] = useState(role === 'supervisor' ? 'summary' : 'logs'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const [matrixMonth, setMatrixMonth] = useState(defaultMonth);
            
            const defaultDept = role === 'supervisor' ? user.dept : '';
            const [filterDept, setFilterDept] = useState(defaultDept);
            const [filterEmp, setFilterEmp] = useState('');
            
            // 🌟 ตั้งค่าวันทำงาน (Local State ดึงจาก Global)
            const [localWorkDays, setLocalWorkDays] = useState(settings?.standardWorkDays || 22);
            useEffect(() => { if(settings) setLocalWorkDays(settings.standardWorkDays); }, [settings]);
            
            const [selectedMapRecord, setSelectedMapRecord] = useState(null);
            const [selectedPhotoRecord, setSelectedPhotoRecord] = useState(null);
            const [editModalData, setEditModalData] = useState(null);
            const [addModalData, setAddModalData] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [scheduleModalData, setScheduleModalData] = useState(null);

            const filteredRecords = records.filter(r => {
                const emp = employees[r.empId];
                if (!emp) return false;
                let match = true;
                if (startDate && r.date < startDate) match = false;
                if (endDate && r.date > endDate) match = false;
                if (filterDept && emp.dept !== filterDept) match = false;
                if (filterEmp) {
                    const search = filterEmp.toLowerCase();
                    const name = `${emp.fname} ${emp.lname}`.toLowerCase();
                    if (!r.empId.toLowerCase().includes(search) && !name.includes(search)) match = false;
                }
                return match;
            });

            const totalCredits = filteredRecords.reduce((sum, r) => sum + (r.credit || 0), 0);
            const totalLateMinutes = filteredRecords.reduce((sum, r) => sum + (r.isLate ? (Number(r.lateMinutes) || 0) : 0), 0);

            const matrixYear = parseInt(matrixMonth.split('-')[0], 10);
            const matrixMonthNum = parseInt(matrixMonth.split('-')[1], 10);
            const daysInMonth = new Date(matrixYear, matrixMonthNum, 0).getDate();
            const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

            const matrixEmployees = Object.keys(employees).filter(id => {
                const emp = employees[id];
                if (filterDept && emp.dept !== filterDept) return false;
                if (filterEmp) {
                    const search = filterEmp.toLowerCase();
                    const name = `${emp.fname} ${emp.lname}`.toLowerCase();
                    if (!id.toLowerCase().includes(search) && !name.includes(search)) return false;
                }
                return true;
            });

            const summaryMatrix = matrixEmployees.map(empId => {
                const empRecords = records.filter(r => r.empId === empId && r.date.startsWith(matrixMonth));
                const shiftsByDay = {};
                const shiftCounts = {}; 
                let empTotalCredit = 0;
                let empTotalLate = 0;

                const todayY = now.getFullYear();
                const todayM = String(now.getMonth() + 1).padStart(2, '0');
                const todayD = String(now.getDate()).padStart(2, '0');
                const todayStr = `${todayY}-${todayM}-${todayD}`;

                daysArray.forEach(day => {
                    const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayRecords = empRecords.filter(r => r.date === dateStr);
                    const scheduledShifts = schedules[dateStr]?.[empId] || [];
                    const isFuture = dateStr > todayStr;
                    
                    if (dayRecords.length > 0) {
                        shiftsByDay[day] = dayRecords.map(r => r.shiftId).join(', ');
                        empTotalCredit += dayRecords.reduce((sum, r) => sum + (r.credit || 0), 0);
                        empTotalLate += dayRecords.reduce((sum, r) => sum + (r.isLate ? Number(r.lateMinutes) : 0), 0);
                        
                        dayRecords.forEach(r => {
                            if(r.shiftId) {
                                shiftCounts[r.shiftId] = (shiftCounts[r.shiftId] || 0) + 1;
                            }
                        });
                    } else {
                        shiftsByDay[day] = scheduledShifts.length > 0 ? scheduledShifts.join(', ') : '-';
                        
                        scheduledShifts.forEach(s => {
                            if(['Vac', 'พักร้อน', 'ป่วย', 'ลา'].includes(s)) {
                                empTotalCredit += 1;
                                shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                            } else if (isFuture && SHIFT_TYPES[s]) {
                                empTotalCredit += SHIFT_TYPES[s].credit;
                                shiftCounts[s] = (shiftCounts[s] || 0) + 1;
                            }
                        });
                    }
                });
                
                const otShifts = empTotalCredit - localWorkDays; // 🌟 ใช้การตั้งค่าส่วนกลาง
                return { empId, fname: employees[empId].fname, lname: employees[empId].lname, dept: employees[empId].dept, shiftsByDay, empTotalCredit, empTotalLate, otShifts, shiftCounts };
            });

            const allShiftTypesUsed = new Set();
            summaryMatrix.forEach(emp => {
                Object.keys(emp.shiftCounts).forEach(type => allShiftTypesUsed.add(type));
            });
            const sortedShiftTypesUsed = Array.from(allShiftTypesUsed).sort((a, b) => {
                if (a === 'พักร้อน' || a === 'Vac') return 1;
                if (b === 'พักร้อน' || b === 'Vac') return -1;
                return a.localeCompare(b);
            });

            // ================= Action Handlers =================
            const handleSaveSettings = async () => {
                const res = await sendToGoogleSheet('saveSettings', { standardWorkDays: localWorkDays });
                if(res.status === 'success') {
                    setSettings({...settings, standardWorkDays: localWorkDays});
                    alert('อัปเดตวันทำการปกติเรียบร้อย ระบบเปลี่ยนให้ทุกคนเห็นตรงกันแล้ว');
                }
            };

            const handleSaveEdit = async () => {
                if(!editModalData.shiftId) return alert('กรุณาเลือกกะ');
                setIsSaving(true);
                const shiftData = SHIFT_TYPES[editModalData.shiftId];
                const res = await sendToGoogleSheet('editRecord', { 
                    id: editModalData.id, timeIn: editModalData.timeIn || '', timeOut: editModalData.timeOut || '',
                    shiftId: editModalData.shiftId, credit: shiftData ? shiftData.credit : 0
                });
                if (res.status === 'success') {
                    setRecords(records.map(r => r.id === editModalData.id ? { 
                        ...r, timeIn: editModalData.timeIn, timeOut: editModalData.timeOut,
                        shiftId: editModalData.shiftId, credit: shiftData ? shiftData.credit : 0
                    } : r));
                    setEditModalData(null);
                }
                setIsSaving(false);
            };

            const handleSaveAdd = async () => {
                if(!addModalData.empId || !addModalData.date || !addModalData.shiftId || !addModalData.timeIn) return alert('กรุณากรอกข้อมูลสำคัญให้ครบ (รหัส, วันที่, กะ, เวลาเข้า)');
                const upperEmp = addModalData.empId.trim().toUpperCase();
                if(!employees[upperEmp]) return alert('ไม่พบรหัสพนักงานนี้ในระบบ');

                setIsSaving(true);
                const shiftData = SHIFT_TYPES[addModalData.shiftId];
                const newRecord = {
                    id: Date.now().toString(), date: addModalData.date, empId: upperEmp,
                    shiftId: addModalData.shiftId, timeIn: addModalData.timeIn, timeOut: addModalData.timeOut || '',
                    isLate: false, lateMinutes: 0, credit: shiftData ? shiftData.credit : 0, lat: null, lon: null, photoBase64: null
                };

                const res = await sendToGoogleSheet('adminAddRecord', newRecord);
                if(res.status === 'success') { setRecords([...records, newRecord]); setAddModalData(null); }
                setIsSaving(false);
            };

            const handleDelete = async (id) => {
                if (confirm('ยืนยันการลบข้อมูลการลงเวลานี้?')) {
                    const res = await sendToGoogleSheet('deleteRecord', { id });
                    if (res.status === 'success') setRecords(records.filter(r => r.id !== id));
                }
            };

            const exportLogsToCSV = () => {
                if(filteredRecords.length === 0) return alert("ไม่มีข้อมูลสำหรับส่งออก");
                let csvContent = "\uFEFFวันที่,รหัสพนักงาน,ชื่อ-สกุล,แผนก,กะ,เวลาเข้า,เวลาออก,สถานะ,สาย (นาที),จำนวนเวร\n";
                filteredRecords.forEach(r => {
                    const emp = employees[r.empId] || {};
                    const shift = SHIFT_TYPES[r.shiftId]?.label || '';
                    const lateStatus = r.isLate ? 'สาย' : 'ปกติ';
                    const lateMins = r.isLate ? r.lateMinutes : '0';
                    csvContent += `"${formatDisplayDate(r.date)}","${r.empId}","${emp.fname} ${emp.lname}","${emp.dept}","${shift}","${r.timeIn}","${r.timeOut || '-'}","${lateStatus}","${lateMins}","${r.credit}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `ประวัติลงเวลา_${new Date().getTime()}.csv`;
                link.click();
            };

            const exportSummaryToCSV = () => {
                if(summaryMatrix.length === 0) return alert("ไม่มีข้อมูลสรุปสำหรับส่งออก");
                let csvContent = "\uFEFF"; 
                
                const headers = ['รหัสพนักงาน', 'ชื่อ-สกุล', 'แผนก', ...daysArray];
                sortedShiftTypesUsed.forEach(type => headers.push(type));
                headers.push('รวมเวรทั้งหมด', 'วันทำการ', 'เวร OT');
                if (role === 'admin') headers.push('รวมสาย (นาที)');

                csvContent += headers.join(',') + '\n';
                
                summaryMatrix.forEach(row => {
                    const rowData = [row.empId, `${row.fname} ${row.lname}`, row.dept];
                    daysArray.forEach(day => rowData.push(row.shiftsByDay[day]));
                    sortedShiftTypesUsed.forEach(type => rowData.push(row.shiftCounts[type] || 0));
                    rowData.push(row.empTotalCredit, localWorkDays, row.otShifts); // 🌟 ใช้การตั้งค่าส่วนกลาง
                    if (role === 'admin') rowData.push(row.empTotalLate);

                    csvContent += `"${rowData.join('","')}"\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `สรุปภาพรวมแผนก_${new Date().getTime()}.csv`;
                link.click();
            };
            
            const openScheduleModal = (empId, dateStr) => setScheduleModalData({ empId, dateStr, shifts: [...(schedules[dateStr]?.[empId] || [])] });
            const handleUpdateScheduleShift = (index, val) => { const newShifts = [...scheduleModalData.shifts]; newShifts[index] = val; setScheduleModalData({...scheduleModalData, shifts: newShifts}); };
            const handleAddScheduleShift = () => setScheduleModalData({...scheduleModalData, shifts: [...scheduleModalData.shifts, '']});
            const handleRemoveScheduleShift = (index) => { const newShifts = [...scheduleModalData.shifts]; newShifts.splice(index, 1); setScheduleModalData({...scheduleModalData, shifts: newShifts}); };

            const handleSaveScheduleCell = async () => {
                const { empId, dateStr, shifts } = scheduleModalData;
                const filteredShifts = shifts.filter(s => s !== ''); 
                
                const newSchedules = { ...schedules };
                if (!newSchedules[dateStr]) newSchedules[dateStr] = {};
                newSchedules[dateStr][empId] = filteredShifts;
                
                setSchedules(newSchedules);
                setScheduleModalData(null);

                await sendToGoogleSheet('saveSchedule', { date: dateStr, empId: empId, shifts: filteredShifts });
            };

            const exportScheduleToCSV = () => {
                if(matrixEmployees.length === 0) return alert("ไม่มีข้อมูลพนักงานสำหรับส่งออก");
                let csvContent = "\uFEFFรหัสพนักงาน,ชื่อ-สกุล,แผนก," + daysArray.join(',') + "\n";
                matrixEmployees.forEach(empId => {
                    const emp = employees[empId];
                    const rowData = [empId, `${emp.fname} ${emp.lname}`, emp.dept];
                    daysArray.forEach(day => {
                        const dateStr = `${matrixYear}-${String(matrixMonthNum).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const shifts = schedules[dateStr]?.[empId] || [];
                        rowData.push(shifts.join(', ') || '-');
                    });
                    csvContent += `"${rowData.join('","')}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `ตารางเวร_${matrixMonth}.csv`;
                link.click();
            };

            const headerColor = role === 'supervisor' ? 'bg-amber-500' : 'bg-slate-800';
            const iconColor = role === 'supervisor' ? 'text-amber-500' : 'text-slate-500';
            const tabActiveColor = role === 'supervisor' ? 'border-amber-600 text-amber-700' : 'border-slate-900 text-slate-900';

            return (
                <div className="bg-white rounded-2xl shadow-minimal border border-slate-200 mt-2 relative overflow-hidden">
                    <div className={`absolute top-0 left-0 w-full h-1 ${headerColor}`}></div>
                    
                    <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50/50">
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center bg-white border border-gray-200 shadow-sm ${iconColor}`}>
                                <i className={`fa-solid ${role === 'supervisor' ? 'fa-user-tie' : 'fa-shield-halved'}`}></i>
                            </div>
                            <div>
                                <p className="text-xs text-gray-500 font-bold uppercase tracking-wider">{role === 'supervisor' ? 'โหมดหัวหน้างาน' : 'โหมดผู้ดูแลระบบ (Admin)'}</p>
                                <p className="font-semibold text-gray-900">{user.fname} {user.lname} <span className="text-xs text-gray-500 font-normal ml-1">({user.id})</span></p>
                            </div>
                        </div>
                        <button onClick={onLogout} className="text-sm px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-100 font-medium transition-colors"><i className="fa-solid fa-arrow-right-from-bracket mr-1.5"></i>ออกจากระบบ</button>
                    </div>

                    {selectedMapRecord && <MapModal lat={selectedMapRecord.lat} lon={selectedMapRecord.lon} onClose={() => setSelectedMapRecord(null)} />}
                    {selectedPhotoRecord && <PhotoModal record={selectedPhotoRecord} employees={employees} onClose={() => setSelectedPhotoRecord(null)} />}
                    
                    {editModalData && (
                        <div className="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-floating overflow-hidden">
                                <div className="p-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-900"><i className="fa-solid fa-pen text-blue-500 mr-2"></i>แก้ไขการลงเวลา</h3>
                                    <button onClick={() => setEditModalData(null)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div className="text-sm bg-blue-50 text-blue-800 p-3 rounded-lg border border-blue-100">
                                        <span className="font-bold">{editModalData.empId}</span> • {employees[editModalData.empId]?.fname} <br/>วันที่: {formatDisplayDate(editModalData.date)}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">กะการทำงาน</label>
                                        <select value={editModalData.shiftId} onChange={(e) => setEditModalData({...editModalData, shiftId: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none text-sm bg-white">
                                            {getSortedShiftKeys().map(key => <option key={key} value={key}>{SHIFT_TYPES[key].label}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-3">
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-gray-500 mb-1">เวลาเข้า (HH:MM)</label>
                                            <input type="time" value={editModalData.timeIn} onChange={(e) => setEditModalData({...editModalData, timeIn: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none text-sm" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-gray-500 mb-1">เวลาออก (HH:MM)</label>
                                            <input type="time" value={editModalData.timeOut || ''} onChange={(e) => setEditModalData({...editModalData, timeOut: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg outline-none text-sm" />
                                        </div>
